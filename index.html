<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LinguaPrime NL - Hollandaca Dil Koçu</title>
<style>
:root {
    --bg: #f2f2f7; --card-bg: #ffffff; --text: #1c1c1e;
    --accent: #007aff; --de-color: #007aff; --het-color: #34c759;
    --hard: #ff3b30; --medium: #ff9500; --easy: #34c759;
}
[data-theme="dark"] { --bg: #1c1c1e; --card-bg: #2c2c2e; --text: #f2f2f7; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.menu-btn { font-size: 24px; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

/* SIDEBAR (OVERLAY MENU) */
.sidebar {
    position: fixed; top: 0; left: 0; width: 300px; height: 100%; 
    background: var(--card-bg); z-index: 1000; transform: translateX(-100%); 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 30px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.1);
    overflow-y: auto;
}
.sidebar.open { transform: translateX(0); }
.sidebar-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.3); z-index: 999; display: none;
    backdrop-filter: blur(3px);
}
.sidebar-overlay.open { display: block; }

/* CARD & CONTENT */
main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.card-container { width: 100%; max-width: 350px; height: 400px; perspective: 1000px; }
.card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; border-radius: 24px; background: var(--card-bg); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
.card-back { transform: rotateY(180deg); justify-content: flex-start; }

.card.de-article { border-top: 8px solid var(--de-color); }
.card.het-article { border-top: 8px solid var(--het-color); }

.grammar-badge { background: rgba(0,122,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 15px; }
.word-main { font-size: 32px; font-weight: 800; }
.info-box { width: 100%; text-align: left; margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 12px; }

/* TEST AREA */
#testArea { display: none; width: 100%; max-width: 350px; background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; }
.word-display { font-size: 24px; letter-spacing: 4px; margin: 20px 0; font-family: monospace; }
input#wordInput { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 18px; text-align: center; outline: none; }

.controls { display: flex; gap: 10px; padding: 20px; width: 100%; max-width: 400px; margin: 0 auto; visibility: hidden; }
.btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; color: white; cursor: pointer; }

#unitFilters button { padding: 8px 12px; margin: 4px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
#unitFilters button.active { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <h2 style="margin-bottom: 20px;">Menü</h2>
    
    <div style="margin-bottom: 25px;">
        <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:8px;">Veri Yükle</label>
        <button onclick="document.getElementById('csvInput').click()" style="width:100%; padding:12px; border-radius:10px; border:2px dashed var(--accent); background:none; color:var(--accent); font-weight:bold; cursor:pointer;">CSV Dosyası Seç</button>
        <input type="file" id="csvInput" style="display:none" accept=".csv" onchange="handleFile(this.files[0])">
    </div>

    <div style="margin-bottom: 25px;">
        <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:8px;">Çalışma Modu</label>
        <select id="workMode" onchange="changeMode()" style="width:100%; padding:10px; border-radius:8px;">
            <option value="flashcard">Kartlar</option>
            <option value="writing">Yazma Testi</option>
        </select>
    </div>

    <div>
        <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:8px;">Üniteler</label>
        <div id="unitFilters"></div>
    </div>
</div>

<header>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="stats" style="font-weight:bold;">Ünite: -</div>
    <div class="menu-btn" id="muteBtn" onclick="toggleMute()">🔊</div>
</header>

<main>
    <div id="cardContainer" class="card-container">
        <div class="card" id="mainCard" onclick="this.classList.toggle('flipped')">
            <div class="card-face">
                <div class="word-main">Welkom!</div>
                <p style="color:#8e8e93; margin-top:10px;">Lütfen CSV yükleyin</p>
            </div>
            <div class="card-face card-back" id="cardBack"></div>
        </div>
    </div>

    <div id="testArea"></div>
</main>

<div class="controls" id="actionControls">
    <button class="btn" style="background:var(--hard)" onclick="handleRate('again')">Zor</button>
    <button class="btn" style="background:var(--medium)" onclick="handleRate('good')">Orta</button>
    <button class="btn" style="background:var(--easy)" onclick="handleRate('easy')">Kolay</button>
</div>

<script>
let allCards = [], currentCards = [], currentIndex = 0, isMuted = false, currentMode = 'flashcard';

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').innerText = isMuted ? '❌' : '🔊';
}

function handleFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const text = e.target.result;
        allCards = parseCSV(text);
        currentCards = [...allCards];
        currentIndex = 0;
        updateUnitFilters();
        showNext();
        toggleSidebar();
        document.getElementById('actionControls').style.visibility = 'visible';
    };
    reader.readAsText(file);
}

function parseCSV(text) {
    return text.split(/\r?\n/).filter(line => line.trim()).map(line => {
        const c = line.split(';');
        return { word:c[0], mean:c[1], sentence:c[2], opposite:c[3], grammarType:c[6], unit:c[7] || '1' };
    }).filter(c => c.word && c.mean);
}

function updateUnitFilters() {
    const units = [...new Set(allCards.map(c => c.unit))].sort((a,b)=>a-b);
    const container = document.getElementById('unitFilters');
    container.innerHTML = '<button onclick="filterUnit(\'all\')" class="active" id="ubtn-all">Hepsi</button>';
    units.forEach(u => {
        container.innerHTML += `<button onclick="filterUnit('${u}')" id="ubtn-${u}">${u}</button>`;
    });
}

function filterUnit(u) {
    document.querySelectorAll('#unitFilters button').forEach(b => b.classList.remove('active'));
    document.getElementById('ubtn-' + u).classList.add('active');
    currentCards = u === 'all' ? [...allCards] : allCards.filter(c => c.unit === u);
    currentIndex = 0;
    showNext();
    toggleSidebar();
}

function changeMode() {
    currentMode = document.getElementById('workMode').value;
    showNext();
}

function showNext() {
    if(!currentCards.length) return;
    if(currentIndex >= currentCards.length) currentIndex = 0;
    
    const card = currentCards[currentIndex];
    const cardEl = document.getElementById('mainCard');
    document.getElementById('stats').innerText = "Ünite: " + card.unit;
    cardEl.classList.remove('flipped');
    
    // Artikel Renk
    cardEl.classList.remove('de-article', 'het-article');
    if(card.word.toLowerCase().startsWith('de ')) cardEl.classList.add('de-article');
    if(card.word.toLowerCase().startsWith('het ')) cardEl.classList.add('het-article');

    if(currentMode === 'flashcard') {
        document.getElementById('cardContainer').style.display = 'block';
        document.getElementById('testArea').style.display = 'none';
        document.getElementById('mainCard').querySelector('.card-face').innerHTML = `
            ${card.grammarType ? `<div class="grammar-badge">${card.grammarType}</div>` : ''}
            <div class="word-main">${card.word}</div>
        `;
        document.getElementById('cardBack').innerHTML = `
            <div style="font-size:24px; font-weight:bold; color:var(--accent); margin-bottom:15px;">${card.mean}</div>
            ${card.sentence ? `<div class="info-box"><small>Cümle</small><div>${card.sentence}</div></div>` : ''}
            ${card.opposite ? `<div class="info-box"><small>Zıt Anlam</small><div>↔️ ${card.opposite}</div></div>` : ''}
        `;
        if(!isMuted) speak(card.word);
    } else {
        startWriting(card);
    }
}

function startWriting(card) {
    document.getElementById('cardContainer').style.display = 'none';
    document.getElementById('testArea').style.display = 'block';
    let hidden = card.word.split('').map(c => (c===' '?' ': (Math.random()>0.5?'_':c))).join('');
    if(!hidden.includes('_')) hidden = card.word.replace(/[a-z]/i, '_');

    document.getElementById('testArea').innerHTML = `
        <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">${card.mean}</div>
        <div class="word-display">${hidden}</div>
        <input type="text" id="wordInput" placeholder="Yazın..." autocomplete="off">
    `;
    const input = document.getElementById('wordInput');
    input.focus();
    input.addEventListener('input', (e) => {
        if(normalize(e.target.value) === normalize(card.word)) {
            e.target.style.borderColor = "var(--easy)";
            setTimeout(() => handleRate('good'), 600);
        }
    });
}

function normalize(t) {
    return t.toLowerCase().replace(/[ıİ]/g,'i').replace(/[öÖ]/g,'o').replace(/[üÜ]/g,'u').replace(/[şŞ]/g,'s').replace(/[ğĞ]/g,'g').replace(/[çÇ]/g,'c').replace(/ij/g,'y').replace(/[^a-z]/g,'');
}

function speak(t) {
    if(isMuted) return;
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang = 'nl-NL';
    window.speechSynthesis.speak(m);
}

function handleRate(d) {
    if(d === 'again') currentCards.push(currentCards[currentIndex]);
    currentIndex++;
    showNext();
}
</script>
</body>
</html>
