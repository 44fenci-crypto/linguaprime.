<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LinguaPrime Ultimate v7 - Klavye Dostu</title>
<style>
/* Mevcut CSS yapın tamamen korunmuştur */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#0A0A0F;color:#F1F3F5;height:100dvh;overflow:hidden;transition:background 0.3s;}
body.light{background:#F3F4F6;color:#1F2937;}
.menu-btn{position:fixed;top:calc(12px + env(safe-area-inset-top));left:16px;z-index:1100;width:44px;height:44px;border-radius:14px;background:rgba(26,26,36,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
body.light .menu-btn{background:rgba(255,255,255,0.9);color:#1F2937;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#0F0F14;border-right:1px solid rgba(255,255,255,0.06);transform:translateX(-100%);transition:transform 0.25s ease;z-index:1300;display:flex;flex-direction:column;padding-top:calc(16px + env(safe-area-inset-top));}
.sidebar.open{transform:translateX(0);}
body.light .sidebar{background:#FFF;border-right:1px solid #E5E7EB;}
.sidebar-header{padding:20px 16px;font-size:18px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;}
.sidebar-item{padding:12px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center;}
.sidebar-item.active{background:#F97316;color:#0A0A0F;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1200;display:none;backdrop-filter:blur(4px);}
.overlay.show{display:block;}
.main{height:100%;display:flex;flex-direction:column;overflow:hidden;}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card-container{width:100%;max-width:560px;perspective:1200px;}
.card{width:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s ease;cursor:pointer;border-radius:32px;}
.card.flipped{transform:rotateY(180deg);}
.card-face{backface-visibility:hidden;background:rgba(26,26,36,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:32px;padding:28px 20px;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
body.light .card-face{background:#FFF;border:1px solid #E5E7EB;}
.card-back{transform:rotateY(180deg);position:absolute;inset:0;}
.word{font-size:32px;font-weight:700;margin:16px 0;}
.badge{background:rgba(255,255,255,0.06);padding:4px 12px;border-radius:24px;font-size:11px;}
.action-bar{display:flex;gap:12px;padding:20px;max-width:560px;margin:0 auto;width:100%;}
.action-btn{flex:1;padding:12px;border-radius:32px;background:#1A1A24;border:none;color:white;font-weight:600;cursor:pointer;}
.action-btn.again{border-left:4px solid #EF4444;}
.action-btn.hard{border-left:4px solid #F97316;}
.action-btn.good{border-left:4px solid #22C55E;}
.action-btn.easy{border-left:4px solid #3B82F6;}
.tts-btn{margin-top:14px;padding:6px 16px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);}
.kalan-sayac{font-size:12px;color:#9CA3AF;margin-bottom:12px;text-align:center;}
#dropZone{min-height:50px; border:2px dashed rgba(255,255,255,0.1); border-radius:16px; margin:15px 0; padding:10px; width:100%; display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
.drag-word{background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:12px; cursor:pointer; font-size:14px; user-select:none;}
#dragWords{display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
</style>
</head><body>

<button class="menu-btn" id="menuBtn">☰</button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">LinguaPrime</div>
  <div id="deckListSidebar" style="flex:1;overflow-y:auto;"></div>
  <div class="sidebar-item" id="addDeckBtn">➕ Yeni Deste</div>
  <div class="sidebar-item" id="manageCardsBtn">📋 Kart Yönetimi</div>
  <div class="sidebar-item" id="kesfetBtn">🔍 Keşfet</div>
  <div class="sidebar-item" id="statsBtn">📊 İstatistik</div>
  <div class="sidebar-item" id="settingsBtn">⚙️ Ayarlar</div>
</div>

<div class="main" id="main">
  <div class="card-area">
    <div id="progressText" class="kalan-sayac"></div>
    <div class="card-container">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="badge" id="frontCat"></div>
          <div class="word" id="frontWord"></div>
          <div id="frontSentence"></div>
          <div id="testArea"></div>
          <div id="dragArea"></div>
          <button class="tts-btn" onclick="playFrontTTS(event)">🔊 Dinle</button>
        </div>
        <div class="card-face card-back">
          <div class="badge" id="backCat"></div>
          <div class="word" id="backWord"></div>
          <div id="backSentence"></div>
          <div id="antonymArea"></div>
          <button class="tts-btn" onclick="playBackTTS(event)">🔊 Dinle</button>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;padding:0 10px;">
    <button class="action-btn" data-mode="normal">Normal</button>
    <button class="action-btn" data-mode="test">Test</button>
    <button class="action-btn" data-mode="hint">Harf</button>
    <button class="action-btn" data-mode="mcq">Çoktan</button>
    <button class="action-btn" data-mode="drag">Sürükle</button>
  </div>

  <div class="action-bar">
    <button class="action-btn again" id="againBtn">Tekrar</button>
    <button class="action-btn hard" id="hardBtn">Zor</button>
    <button class="action-btn good" id="goodBtn">Biliyorum</button>
    <button class="action-btn easy" id="easyBtn">Kolay</button>
  </div>
</div>

<div id="kesfetScreen" style="display:none;flex-direction:column;height:100%;">
  <div class="card-area" style="flex:1;">
    <div class="card-container">
      <div class="card" id="kesfetCard">
        <div class="card-face card-front">
          <div class="badge" id="kesfetCat"></div>
          <div class="word" id="kesfetWord"></div>
          <button class="tts-btn" onclick="playKesfetFrontTTS(event)">🔊</button>
        </div>
        <div class="card-face card-back">
          <div class="badge" id="kesfetBackCat"></div>
          <div class="word" id="kesfetBackWord"></div>
          <button class="tts-btn" onclick="playKesfetBackTTS(event)">🔊</button>
        </div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:20px;justify-content:center;margin:20px;">
    <button class="action-btn again" id="kesfetNoBtn">Bilmiyorum</button>
    <button class="action-btn good" id="kesfetYesBtn">Biliyorum</button>
  </div>
  <div id="kesfetKalan" class="kalan-sayac"></div>
  <button id="kesfetCloseBtn" style="margin:10px auto;background:none;border:none;color:#9CA3AF;">Çık</button>
</div>

<script>
/* ===============================
   STORAGE + DATA
================================= */
const STORAGE_KEY = "lp_ultimate_v7";
let appData = {
  version: 7,
  decks: [],
  currentDeckId: null,
  cards: [],
  settings: { mode: "normal", tts: "on", ttsSpeed: 1.0, direction: "nltr", theme: "dark" }
};

function generateId() { return crypto.randomUUID(); }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = { ...appData, ...JSON.parse(raw) };
  } catch (e) { console.warn("Storage load error", e); }
  if (!appData.decks.length) {
    const id = generateId();
    appData.decks = [{ id, name: "Genel" }];
    appData.currentDeckId = id;
  }
  if (!appData.currentDeckId) appData.currentDeckId = appData.decks[0].id;
}

/* ===============================
   Klavye Dostu Normalizasyon (Fix)
================================= */
function normalizeText(str) {
  if (!str) return "";
  const charMap = {
    'İ':'i', 'I':'i', 'ı':'i', 'Ş':'s', 'ş':'s', 'Ğ':'g', 'ğ':'g', 
    'Ü':'u', 'ü':'u', 'Ö':'o', 'ö':'o', 'Ç':'c', 'ç':'c'
  };
  let text = String(str);
  Object.keys(charMap).forEach(key => {
    text = text.replace(new RegExp(key, 'g'), charMap[key]);
  });
  return text.toLowerCase()
    .replace(/[.,\/#!$%\^&\*;:{}=\-_~()?"']/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function escapeHtml(str) {
  return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function getCards() { return appData.cards.filter(c => c.deckId === appData.currentDeckId); }
function getDueCards() {
  const now = Date.now();
  return getCards().filter(c => (c.due || 0) <= now).sort((a, b) => (a.due || 0) - (b.due || 0));
}

/* ===============================
   SM2 ALGORITMASI (Korundu)
================================= */
function updateSM2(card, quality) {
  const qMap = { again: 1, hard: 3, good: 4, easy: 5 };
  let q = qMap[quality];
  let reps = card.repetitions || 0;
  let iv = card.interval || 1;
  let ease = card.ease || 2.5;

  if (q < 3) { reps = 0; iv = 1; } 
  else {
    reps++;
    if (reps === 1) iv = 1;
    else if (reps === 2) iv = 6;
    else iv = Math.round(iv * ease);
    ease += 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02);
    if (ease < 1.3) ease = 1.3;
  }
  if (quality === "hard") iv = Math.max(1, Math.round(iv * 0.5));
  if (quality === "easy") iv = Math.round(iv * 1.3);
  card.due = Date.now() + (quality === "again" ? 600000 : iv * 86400000);
  card.repetitions = reps; card.interval = iv; card.ease = ease;
  save();
}

function answer(quality) {
  if (!currentCard) return;
  quality === "again" ? currentCard.wrong = (currentCard.wrong || 0) + 1 : currentCard.correct = (currentCard.correct || 0) + 1;
  updateSM2(currentCard, quality);
  nextCard();
}

/* ===============================
   TTS (Korundu)
================================= */
function speakText(text, lang) {
  if (appData.settings.tts !== "on" || !text) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang === "nl" ? "nl-NL" : "tr-TR";
  utter.rate = appData.settings.ttsSpeed;
  speechSynthesis.speak(utter);
}

function playFrontTTS(e) { e.stopPropagation(); speakText(getFrontText(), appData.settings.direction === "nltr" ? "nl" : "tr"); }
function playBackTTS(e) { e.stopPropagation(); speakText(getBackText(), appData.settings.direction === "nltr" ? "tr" : "nl"); }

/* ===============================
   RENDERING & MODES (Fix)
================================= */
let currentCard = null;
function nextCard() {
  const due = getDueCards();
  document.getElementById("progressText").innerText = due.length > 0 ? `${due.length} kart kaldı` : "🎉 Tamamlandı";
  if (!due.length) { document.getElementById("frontWord").innerHTML = "🎉 Tüm kartlar tamam!"; return; }
  currentCard = due[0];
  renderCurrentCard();
}

function getFrontText() { return appData.settings.direction === "nltr" ? currentCard.word : currentCard.meaning; }
function getBackText() { return appData.settings.direction === "nltr" ? currentCard.meaning : currentCard.word; }

function renderCurrentCard() {
  if (!currentCard) return;
  const backText = getBackText();
  document.getElementById("frontWord").innerHTML = escapeHtml(getFrontText());
  document.getElementById("backWord").innerHTML = escapeHtml(backText);
  document.getElementById("frontCat").innerText = document.getElementById("backCat").innerText = currentCard.category || "";
  document.getElementById("frontSentence").innerHTML = document.getElementById("backSentence").innerHTML = escapeHtml(currentCard.sentence || "");
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("testArea").innerHTML = document.getElementById("dragArea").innerHTML = "";

  if (appData.settings.mode === "test") renderTestMode(backText);
  else if (appData.settings.mode === "hint") renderHintMode(backText);
  else if (appData.settings.mode === "mcq") renderMCQMode(backText);
  else if (appData.settings.mode === "drag") renderDragMode();
}

function renderTestMode(correct) {
  const input = document.createElement("input");
  input.placeholder = "Cevap yaz...";
  input.style = "padding:10px;border-radius:20px;margin-top:10px;width:80%;border:1px solid #333;background:#1A1A24;color:white;";
  const btn = document.createElement("button");
  btn.textContent = "Kontrol"; btn.className = "action-btn"; btn.style.marginTop = "8px";
  btn.onclick = () => normalizeText(input.value) === normalizeText(correct) ? answer("good") : (alert("Doğrusu: " + correct), answer("again"));
  document.getElementById("testArea").append(input, btn);
}

function renderHintMode(correct) {
  let pattern = "";
  for (let i = 0; i < correct.length; i++) pattern += correct[i] === " " ? " " : i % 2 === 0 ? correct[i] : "_";
  document.getElementById("testArea").innerHTML = `<div style="font-size:26px;margin:10px;">${pattern}</div><input id="hintInput" placeholder="Cevap" style="padding:8px;border-radius:20px;background:#1A1A24;color:white;border:1px solid #333;"><button onclick="window.chkH()" class="action-btn" style="margin-left:8px;">Kontrol</button>`;
  window.chkH = () => normalizeText(document.getElementById("hintInput").value) === normalizeText(correct) ? answer("good") : answer("again");
}

function renderMCQMode(correct) {
  const options = [...getCards().filter(c => c.id !== currentCard.id).slice(0, 3).map(c => appData.settings.direction === "nltr" ? c.meaning : c.word), correct].sort(() => Math.random() - 0.5);
  const container = document.createElement("div");
  options.forEach(opt => {
    const btn = document.createElement("button"); btn.className = "action-btn"; btn.style.margin = "4px"; btn.innerText = opt;
    btn.onclick = () => normalizeText(opt) === normalizeText(correct) ? answer("good") : answer("again");
    container.appendChild(btn);
  });
  document.getElementById("testArea").appendChild(container);
}

function renderDragMode() {
  const sentence = currentCard.sentence; if (!sentence) return;
  const words = sentence.split(" ");
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  document.getElementById("dragArea").innerHTML = `<div id="dragWords"></div><div id="dropZone"></div><button id="checkDrag" class="action-btn" style="margin-top:10px;">Kontrol</button>`;
  
  shuffled.forEach(w => {
    const s = document.createElement("span"); s.className = "drag-word"; s.innerText = w;
    s.onclick = () => s.parentElement.id === "dragWords" ? document.getElementById("dropZone").appendChild(s) : document.getElementById("dragWords").appendChild(s);
    document.getElementById("dragWords").appendChild(s);
  });

  document.getElementById("checkDrag").onclick = () => {
    const user = Array.from(document.getElementById("dropZone").children).map(el => el.innerText).join(" ");
    normalizeText(user) === normalizeText(sentence) ? answer("good") : answer("again");
  };
}

/* ===============================
   SIDEBAR & MENUS (Korundu)
================================= */
function renderSidebar() {
  const container = document.getElementById("deckListSidebar"); container.innerHTML = "";
  appData.decks.forEach(deck => {
    const div = document.createElement("div"); div.className = "sidebar-item" + (deck.id === appData.currentDeckId ? " active" : "");
    div.innerText = deck.name;
    div.onclick = () => { appData.currentDeckId = deck.id; save(); renderSidebar(); nextCard(); closeSidebar(); };
    container.appendChild(div);
  });
}

function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); };

document.getElementById("addDeckBtn").onclick = () => {
  const name = prompt("Deste adı:"); if (!name) return;
  const id = generateId(); appData.decks.push({ id, name }); appData.currentDeckId = id; save(); renderSidebar(); nextCard();
};

document.getElementById("manageCardsBtn").onclick = () => { alert(getCards().map(c => c.word).join("\n") || "Kart yok"); };

/* ===============================
   SWIPE (Korundu)
================================= */
function initSwipe(cardId, onRight, onLeft) {
  const card = document.getElementById(cardId); if (!card) return;
  let startX = 0, startY = 0;
  card.addEventListener("touchstart", e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
  card.addEventListener("touchmove", e => {
    const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) e.preventDefault();
  });
  card.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 80) dx > 0 ? onRight() : onLeft();
  });
}

/* ===============================
   INIT & EVENTS
================================= */
document.getElementById("card").onclick = (e) => e.target.classList.contains("tts-btn") ? null : document.getElementById("card").classList.toggle("flipped");
document.querySelectorAll("[data-mode]").forEach(btn => btn.onclick = () => { appData.settings.mode = btn.dataset.mode; save(); renderCurrentCard(); });
document.getElementById("againBtn").onclick = () => answer("again");
document.getElementById("hardBtn").onclick = () => answer("hard");
document.getElementById("goodBtn").onclick = () => answer("good");
document.getElementById("easyBtn").onclick = () => answer("easy");
document.getElementById("overlay").onclick = closeSidebar;

load(); renderSidebar(); nextCard();
initSwipe("card", () => answer("good"), () => answer("again"));
</script>
</body>
</html>
