<style>

body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#0A0A0F;color:#F1F3F5;height:100dvh;overflow:hidden;transition:background 0.3s;}

.edit-deck-btn,.delete-deck-btn{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;padding:6px 8px;border-radius:8px;}

<script>/* =========================
   DATA & STORAGE
========================= */

const STORAGE_KEY = "lp_ultimate_v8";

let appData = {
  version: 8,
  decks: [],
  currentDeckId: null,
  cards: [],
  settings: {
    mode: "normal",
    tts: "on",
    ttsSpeed: 1.0,
    direction: "nltr",
    theme: "dark",
    showOnlyActiveDeck: false
  }
};

function generateId() {
  return crypto.randomUUID();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      appData = { ...appData, ...parsed };
    }
  } catch (e) {
    console.warn("Load error", e);
  }

  if (!appData.decks.length) {
    const id = generateId();
    appData.decks = [{ id, name: "Genel" }];
    appData.currentDeckId = id;
  }

  if (!appData.currentDeckId)
    appData.currentDeckId = appData.decks[0].id;

  applyTheme();
}

/* =========================
   HELPERS
========================= */

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function normalizeText(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function getCards() {
  return appData.cards.filter(
    c => c.deckId === appData.currentDeckId
  );
}

function getDueCards() {
  const now = Date.now();
  return getCards()
    .filter(c => (c.due || 0) <= now)
    .sort((a,b) => (a.due||0)-(b.due||0));
}

/* =========================
   SM2 FIX (Hard %50)
========================= */

function updateSM2(card, quality) {

  const qMap = { again:1, hard:3, good:4, easy:5 };
  let q = qMap[quality];

  let reps = card.repetitions||0;
  let iv = card.interval||1;
  let ease = card.ease||2.5;

  if(q<3){
    reps = 0;
    iv = 1;
  }else{
    reps++;
    if(reps===1) iv=1;
    else if(reps===2) iv=6;
    else iv=Math.round(iv*ease);

    ease += 0.1-(5-q)*(0.08+(5-q)*0.02);
    if(ease<1.3) ease=1.3;
  }

  if(quality==="hard"){
    iv = Math.max(1, Math.round(iv*0.5));
  }

  if(quality==="easy"){
    iv = Math.round(iv*1.3);
  }

  const delay =
    quality==="again"
      ? 10*60*1000
      : iv*86400000;

  card.due = Date.now()+delay;
  card.repetitions = reps;
  card.interval = iv;
  card.ease = ease;

  save();
}

function answer(q){
  if(!currentCard) return;

  if(q==="again")
    currentCard.wrong=(currentCard.wrong||0)+1;
  else
    currentCard.correct=(currentCard.correct||0)+1;

  updateSM2(currentCard,q);
  nextCard();
}

/* =========================
   TTS STABLE
========================= */

function speakText(text,lang){
  if(appData.settings.tts!=="on") return;
  if(!text) return;

  speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang = lang==="nl"?"nl-NL":"tr-TR";
  u.rate = appData.settings.ttsSpeed||1;

  speechSynthesis.speak(u);
}/* =========================
   CARD FLOW
========================= */

let currentCard = null;
let currentHintPattern = null;

function nextCard(){
  currentHintPattern = null;
  const due = getDueCards();

  document.getElementById("progressText").innerText =
    due.length
      ? `${due.length} kart kaldı`
      : "🎉 Tüm kartlar tamam!";

  if(!due.length){
    document.getElementById("frontWord").innerHTML="🏆 Tebrikler!";
    return;
  }

  currentCard = due[0];
  renderCurrentCard();
}

function getFrontText(){
  return appData.settings.direction==="nltr"
    ? currentCard.word
    : currentCard.meaning;
}

function getBackText(){
  return appData.settings.direction==="nltr"
    ? currentCard.meaning
    : currentCard.word;
}

function renderCurrentCard(){

  if(!currentCard) return;

  document.getElementById("card").classList.remove("flipped");

  document.getElementById("frontWord").innerHTML =
    escapeHtml(getFrontText());

  document.getElementById("backWord").innerHTML =
    escapeHtml(getBackText());

  document.getElementById("frontCat").innerText =
    currentCard.category||"";

  document.getElementById("backCat").innerText =
    currentCard.category||"";

  document.getElementById("frontSentence").innerHTML =
    escapeHtml(currentCard.sentence||"");

  document.getElementById("backSentence").innerHTML =
    escapeHtml(currentCard.sentence||"");

  document.getElementById("testArea").innerHTML="";
  document.getElementById("dragArea").innerHTML="";

  if(appData.settings.mode==="test")
    renderTestMode(getBackText());

  if(appData.settings.mode==="hint")
    renderHintMode(getBackText());

  if(appData.settings.mode==="mcq")
    renderMCQMode(getBackText());

  if(appData.settings.mode==="article")
    renderArticleMode();

  if(appData.settings.mode==="drag")
    renderDragMode();
}

/* =========================
   TEST MODE (Punctuation Safe)
========================= */

function renderTestMode(correct){

  const inp=document.createElement("input");
  inp.placeholder="Cevabı yaz...";
  inp.style="padding:10px;border-radius:20px;width:80%;";

  const btn=document.createElement("button");
  btn.className="action-btn";
  btn.innerText="Kontrol";
  btn.style.marginTop="8px";

  btn.onclick=()=>{
    if(normalizeText(inp.value)===normalizeText(correct))
      answer("good");
    else{
      alert("Yanlış! Doğrusu: "+correct);
      answer("again");
    }
  };

  document.getElementById("testArea").append(inp,btn);
}

/* =========================
   HINT MODE
========================= */

function renderHintMode(correct){

  if(!currentHintPattern){
    let p="";
    for(let i=0;i<correct.length;i++){
      p+=correct[i]===" "
        ? " "
        : i%2===0
          ? correct[i]
          : "_";
    }
    currentHintPattern=p;
  }

  document.getElementById("testArea").innerHTML=
    `<div style="font-size:26px;margin:10px;">
      ${currentHintPattern}
     </div>
     <input id="hintInput" style="padding:8px;border-radius:20px;">
     <button class="action-btn" onclick="checkHint()">Kontrol</button>`;

  window.checkHint=()=>{
    const val=document.getElementById("hintInput").value;
    if(normalizeText(val)===normalizeText(correct))
      answer("good");
    else
      answer("again");
  };

  setTimeout(()=>{
    document.getElementById("hintInput")
      ?.scrollIntoView({block:"center"});
  },200);
}

/* =========================
   MCQ SAFE
========================= */

function renderMCQMode(correct){

  const pool=getCards()
    .filter(c=>c.id!==currentCard.id)
    .slice(0,3)
    .map(c=>
      appData.settings.direction==="nltr"
        ? c.meaning
        : c.word
    );

  const opts=[...pool,correct]
    .sort(()=>Math.random()-0.5);

  const box=document.createElement("div");

  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="action-btn";
    b.innerText=o;
    b.onclick=()=>o===correct
      ? answer("good")
      : answer("again");
    box.appendChild(b);
  });

  document.getElementById("testArea").appendChild(box);
}

/* =========================
   DRAG MODE (FULL FIX)
========================= */

function renderDragMode(){

  const sentence=currentCard.sentence;
  if(!sentence) return;

  const words=sentence.split(" ");
  const shuffled=[...words]
    .sort(()=>Math.random()-0.5);

  let html=
    `<div class="drag-container" id="dragWords">`;

  shuffled.forEach(w=>{
    html+=
      `<span class="drag-word"
        data-word="${escapeHtml(w)}">
        ${escapeHtml(w)}
      </span>`;
  });

  html+=`</div>
    <div class="drop-zone" id="dropZone"></div>
    <button id="checkDrag"
      class="action-btn"
      style="margin-top:10px;">
      Kontrol
    </button>`;

  document.getElementById("dragArea").innerHTML=html;

  document.querySelectorAll("#dragWords .drag-word")
    .forEach(el=>{
      el.onclick=()=>{
        const word=el.dataset.word;
        const dz=document.getElementById("dropZone");

        const span=document.createElement("span");
        span.className="drag-word";
        span.dataset.word=word;
        span.innerText=word;

        span.onclick=()=>{
          document.getElementById("dragWords")
            .appendChild(span);
        };

        dz.appendChild(span);
        el.remove();
      };
    });

  document.getElementById("checkDrag").onclick=()=>{
    const user=
      Array.from(
        document.getElementById("dropZone").children
      )
      .map(e=>e.innerText)
      .join(" ");

    if(normalizeText(user)===normalizeText(sentence))
      answer("good");
    else
      answer("again");
  };
}

/* =========================
   ARTICLE MODE
========================= */

function renderArticleMode(){
  const word=currentCard.word;
  if(!word.startsWith("de ") &&
     !word.startsWith("het "))
     return;

  const article=word.split(" ")[0];
  const noun=word.split(" ")[1];

  document.getElementById("testArea").innerHTML=
    `<div>Hangi artikel? <strong>${noun}</strong></div>
     <div style="margin-top:10px;">
       <button class="action-btn"
         onclick="articleAnswer('${article}','de')">
         de
       </button>
       <button class="action-btn"
         onclick="articleAnswer('${article}','het')">
         het
       </button>
     </div>`;
}

function articleAnswer(correct,user){
  user===correct
    ? answer("good")
    : answer("again");
}

/* =========================
   SWIPE FIX (Scroll Safe)
========================= */

function initSwipe(cardId,onRight,onLeft){

  const card=document.getElementById(cardId);
  if(!card) return;

  let startX=0,startY=0;

  card.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
  });

  card.addEventListener("touchmove",e=>{
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;

    if(Math.abs(dx)>30 &&
       Math.abs(dx)>Math.abs(dy)){
      e.preventDefault();
    }
  });

  card.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>80){
      dx>0?onRight():onLeft();
    }
  });

/* =========================
   CSV SAFE IMPORT
========================= */

function parseCSVLine(line){
  const result=[];
  let current="",inQuotes=false;

  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"') inQuotes=!inQuotes;
    else if(ch===","&&!inQuotes){
      result.push(current);
      current="";
    }else{
      current+=ch;
    }
  }
  result.push(current);
  return result.map(s=>s.trim());
}

document.getElementById("importCsvBtn")
  .onclick=()=>{
    document.getElementById("csvFileInput").click();
  };

document.getElementById("csvFileInput")
  .onchange=(e)=>{
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=(ev)=>{
      const lines=
        ev.target.result.split("\n");

      for(let i=1;i<lines.length;i++){
        if(!lines[i].trim()) continue;

        const parts=
          parseCSVLine(lines[i]);

        if(parts.length<2) continue;

        appData.cards.push({
          id:generateId(),
          deckId:appData.currentDeckId,
          word:parts[0],
          meaning:parts[1],
          sentence:parts[2]||"",
          category:"Genel",
          repetitions:0,
          interval:0,
          ease:2.5,
          due:Date.now()
        });
      }

      save();
      renderManagerTable();
      nextCard();
      alert("CSV yüklendi.");
    };
    reader.readAsText(file,"UTF-8");
  };

/* =========================
   STATS (Scaled Tree)
========================= */

document.getElementById("statsBtn")
  .onclick=()=>{
    const cards=getCards();
    const correct=
      cards.reduce((a,c)=>a+(c.correct||0),0);
    const wrong=
      cards.reduce((a,c)=>a+(c.wrong||0),0);

    document.getElementById("statsContent")
      .innerHTML=
        `<div>Toplam: ${cards.length}</div>
         <div>Doğru: ${correct}</div>
         <div>Yanlış: ${wrong}</div>`;

    const ctx=
      document.getElementById("treeCanvas")
        .getContext("2d");

    ctx.clearRect(0,0,220,180);

    const level=
      Math.min(12,
        Math.floor((correct+wrong)/5));

    ctx.fillStyle="#22C55E";
    for(let i=0;i<level;i++){
      ctx.fillRect(100,160-i*12,20,8);
    }

    document.getElementById("statsModal")
      .classList.add("open");
    document.getElementById("overlay")
      .classList.add("show");
  };

  .onclick=()=>{
    document.getElementById("statsModal")
      .classList.remove("open");
    document.getElementById("overlay")
      .classList.remove("show");
  };
