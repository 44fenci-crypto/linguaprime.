<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LinguaPrime v9 - Çalışan Versiyon</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #e8e8ed;
  color: #1c1c1e;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: white;
  padding: 12px 16px;
  border-bottom: 1px solid #e5e5ea;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.streak-box {
  display: flex;
  align-items: center;
  gap: 12px;
}

.streak {
  background: #f97316;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

.goal {
  font-size: 12px;
  color: #666;
  background: #f3f4f6;
  padding: 6px 12px;
  border-radius: 20px;
}

.stats {
  display: flex;
  gap: 12px;
}

.stat {
  background: #e8e8ed;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background: #1c1c1e;
  color: white;
  transition: left 0.3s ease;
  z-index: 1000;
  padding: 20px;
  overflow-y: auto;
}

.sidebar.open {
  left: 0;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
}

.overlay.open {
  display: block;
}

.menu-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
}

.sidebar h3 {
  margin-bottom: 16px;
  font-size: 18px;
}

.sidebar h4 {
  margin: 20px 0 8px 0;
  font-size: 14px;
  color: #aaa;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  background: #2c2c2e;
  color: white;
}

.sidebar button.primary {
  background: #4f46e5;
}

.deck-list {
  margin: 10px 0;
}

.deck-item {
  background: #2c2c2e;
  color: white;
  text-align: left;
  padding: 10px;
  margin: 4px 0;
  border-radius: 8px;
  cursor: pointer;
}

.deck-item.active {
  background: #4f46e5;
}

.sidebar select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  background: #2c2c2e;
  color: white;
  border: none;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card-container {
  width: 100%;
  max-width: 520px;
  margin: 20px auto;
  cursor: pointer;
  perspective: 1000px;
}

.card {
  background: white;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  transition: transform 0.5s ease;
  min-height: 320px;
  position: relative;
  transform-style: preserve-3d;
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  width: 100%;
  backface-visibility: hidden;
  border-radius: 24px;
  padding: 40px 24px;
  position: absolute;
  top: 0;
  left: 0;
}

.card-back {
  transform: rotateY(180deg);
}

.card-word {
  font-size: 32px;
  font-weight: bold;
  margin: 16px 0;
}

.card-category {
  font-size: 12px;
  color: #888;
  margin-bottom: 8px;
}

.card-sentence {
  font-size: 14px;
  color: #666;
  font-style: italic;
  margin-top: 16px;
}

.diff-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
}

/* BUTTONS */
.button-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s ease;
}

.btn:active {
  transform: scale(0.96);
}

.btn-primary {
  background: #4f46e5;
  color: white;
}

.btn-secondary {
  background: #e8e8ed;
  color: #333;
}

.btn-again {
  background: #dc2626;
  color: white;
}

.btn-hard {
  background: #ea580c;
  color: white;
}

.btn-good {
  background: #16a34a;
  color: white;
}

.btn-easy {
  background: #4f46e5;
  color: white;
}

/* MODAL */
.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 24px;
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  z-index: 1001;
  display: none;
}

.modal.open {
  display: block;
}

.modal input, .modal select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.modal button {
  margin-top: 12px;
}

.mode-badge {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 20px;
}

/* TEST INPUT */
.test-input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  text-align: center;
  margin-bottom: 12px;
}

/* DARK THEME */
body.dark {
  background: #1a1a1e;
  color: #f5f5f5;
}

body.dark .header {
  background: #2c2c2e;
  border-color: #3a3a3c;
}

body.dark .card {
  background: #2c2c2e;
  color: #f5f5f5;
}

body.dark .stat {
  background: #3a3a3c;
  color: #f5f5f5;
}

body.dark .goal {
  background: #3a3a3c;
  color: #f5f5f5;
}

body.dark .btn-secondary {
  background: #3a3a3c;
  color: #f5f5f5;
}

body.dark .modal {
  background: #2c2c2e;
  color: #f5f5f5;
}

body.dark .modal input, body.dark .modal select {
  background: #3a3a3c;
  color: #f5f5f5;
  border-color: #555;
}

@media (max-width: 600px) {
  .card-word {
    font-size: 24px;
  }
  .btn {
    padding: 10px 16px;
    font-size: 12px;
  }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <h3>🗂️ LinguaPrime v9</h3>
  <button onclick="closeSidebar()" style="background:#333">✕ Kapat</button>
  
  <h4>📚 Desteler</h4>
  <div id="deckList" class="deck-list"></div>
  <button onclick="createDeck()">➕ Yeni Deste</button>
  <button onclick="deleteDeck()" style="background:#dc2626">🗑 Sil Deste</button>
  
  <h4>⚙️ Ayarlar</h4>
  <select id="directionSelect" onchange="changeDirection()">
    <option value="nltr">🇳🇱 NL → TR</option>
    <option value="trnl">🇹🇷 TR → NL</option>
  </select>
  <select id="modeSelect" onchange="changeMode()">
    <option value="normal">🃏 Normal Mod</option>
    <option value="test">✍️ Yazma Testi</option>
  </select>
  
  <h4>📋 Kartlar</h4>
  <button class="primary" onclick="openAddCardModal()">✍️ Kart Ekle</button>
  <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV(this)">
  <button onclick="document.getElementById('csvFile').click()">📂 CSV Yükle</button>
  
  <h4>📊 Araçlar</h4>
  <button onclick="openAnalysis()">📊 Analiz</button>
  <button onclick="openManager()">📋 Kart Yönetimi</button>
  <button onclick="toggleTheme()">🌙 Koyu Tema</button>
</div>

<div class="header">
  <div>
    <button class="menu-btn" onclick="openSidebar()">☰</button>
  </div>
  <div class="streak-box">
    <div class="streak" id="streakDisplay">🔥 0</div>
    <div class="goal" id="goalDisplay">📅 0/20</div>
  </div>
  <div class="stats">
    <div class="stat">✅ <span id="correctCount">0</span></div>
    <div class="stat">❌ <span id="wrongCount">0</span></div>
    <div class="stat">⏳ <span id="dueCount">0</span></div>
  </div>
</div>

<div class="main">
  <div class="card-container" onclick="onCardClick()">
    <div class="card" id="card">
      <div class="card-front" id="cardFront">
        <div class="card-category" id="frontCategory">Kategori</div>
        <div class="card-word" id="frontWord">Yükleniyor...</div>
        <div class="diff-badge" id="frontDiff"></div>
      </div>
      <div class="card-back" id="cardBack">
        <div class="card-category" id="backCategory">Kategori</div>
        <div class="card-word" id="backWord"></div>
        <div class="card-sentence" id="backSentence"></div>
        <div class="diff-badge" id="backDiff"></div>
      </div>
    </div>
  </div>
  
  <div id="actionButtons" class="button-group"></div>
  <div class="mode-badge" id="modeBadge"></div>
</div>

<!-- Add Card Modal -->
<div class="modal" id="addCardModal">
  <h3>✍️ Yeni Kart</h3>
  <input type="text" id="newWord" placeholder="Kelime (NL)" autocomplete="off">
  <input type="text" id="newMeaning" placeholder="Anlam (TR)" autocomplete="off">
  <input type="text" id="newSentence" placeholder="Örnek Cümle (opsiyonel)" autocomplete="off">
  <select id="newCategory"><option>Genel</option><option>Fiiller</option><option>Hayvanlar</option><option>Ev</option><option>Yiyecekler</option><option>Meslekler</option></select>
  <select id="newDiff"><option value="">Zorluk Yok</option><option value="kolay">🟢 Kolay</option><option value="orta">🟡 Orta</option><option value="zor">🔴 Zor</option></select>
  <button class="btn btn-primary" onclick="addCard()">➕ Ekle</button>
  <button class="btn btn-secondary" onclick="closeAddCardModal()">İptal</button>
</div>

<!-- Analysis Modal -->
<div class="modal" id="analysisModal">
  <h3>📊 Analiz</h3>
  <div id="analysisContent"></div>
  <button class="btn btn-secondary" onclick="closeAnalysis()">Kapat</button>
</div>

<!-- Manager Modal -->
<div class="modal" id="managerModal">
  <h3>📋 Kart Yönetimi</h3>
  <div id="managerContent"></div>
  <button class="btn btn-secondary" onclick="closeManager()">Kapat</button>
</div>

<script>
// ============================================
// LINGUAPRIME V9 - FULLY WORKING VERSION
// ============================================

let app = {
  decks: [],
  currentDeck: 0,
  direction: "nltr",
  mode: "normal",
  streak: {
    current: 0,
    longest: 0,
    lastStudy: "",
    todayDone: 0,
    dailyGoal: 20,
    totalCards: 0,
    totalCorrect: 0
  }
};

let currentCardIndex = -1;
let isFlipped = false;
let testAnswer = "";
let sessionCorrect = 0;
let sessionWrong = 0;

// ============ SAVE & LOAD ============
function save() {
  localStorage.setItem("linguaPrime", JSON.stringify(app));
}

function load() {
  const saved = localStorage.getItem("linguaPrime");
  if (saved) {
    try {
      const data = JSON.parse(saved);
      app.decks = data.decks || [];
      app.currentDeck = data.currentDeck || 0;
      app.direction = data.direction || "nltr";
      app.mode = data.mode || "normal";
      app.streak = data.streak || {
        current: 0, longest: 0, lastStudy: "", todayDone: 0,
        dailyGoal: 20, totalCards: 0, totalCorrect: 0
      };
    } catch(e) {}
  }
  
  if (app.decks.length === 0) {
    app.decks = [{ name: "Genel", cards: [] }];
  }
  
  // Add sample cards if empty
  if (app.decks[app.currentDeck].cards.length === 0) {
    addSampleCards();
  }
  
  updateUI();
  pickCard();
  updateStats();
  updateStreakDisplay();
}

function addSampleCards() {
  const cards = app.decks[app.currentDeck].cards;
  const now = Date.now();
  cards.push({
    word: "lopen", meaning: "yürümek", sentence: "Ik loop naar huis.",
    category: "Fiiller", diffLabel: "kolay", correct: 0, wrong: 0,
    repetitions: 0, interval: 0, ease: 2.5, due: now - 86400000, history: []
  });
  cards.push({
    word: "fietsen", meaning: "bisiklet sürmek", sentence: "Wij fietsen naar school.",
    category: "Fiiller", diffLabel: "kolay", correct: 0, wrong: 0,
    repetitions: 0, interval: 0, ease: 2.5, due: now - 86400000, history: []
  });
  cards.push({
    word: "de hond", meaning: "köpek", sentence: "De hond blaft.",
    category: "Hayvanlar", diffLabel: "kolay", correct: 0, wrong: 0,
    repetitions: 0, interval: 0, ease: 2.5, due: now - 86400000, history: []
  });
  cards.push({
    word: "het huis", meaning: "ev", sentence: "Het huis is groot.",
    category: "Ev", diffLabel: "orta", correct: 0, wrong: 0,
    repetitions: 0, interval: 0, ease: 2.5, due: now - 86400000, history: []
  });
  cards.push({
    word: "eten", meaning: "yemek yemek", sentence: "Ik eet een appel.",
    category: "Fiiller", diffLabel: "kolay", correct: 0, wrong: 0,
    repetitions: 0, interval: 0, ease: 2.5, due: now - 86400000, history: []
  });
  save();
}

function deck() {
  return app.decks[app.currentDeck];
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function getQuestion(card) {
  return app.direction === "nltr" ? card.word : card.meaning;
}

function getAnswer(card) {
  return app.direction === "nltr" ? card.meaning : card.word;
}

// ============ SM-2 ALGORITHM ============
function updateSM2(card, quality) {
  let { repetitions, interval, ease } = card;
  
  if (quality === "again") {
    repetitions = 0;
    interval = 1;
    ease = Math.max(1.3, ease - 0.2);
  } else if (quality === "hard") {
    repetitions = 1;
    interval = 1;
    ease = Math.max(1.3, ease - 0.15);
  } else if (quality === "good") {
    repetitions++;
    if (repetitions === 1) interval = 1;
    else if (repetitions === 2) interval = 6;
    else interval = Math.round(interval * ease);
    ease = Math.min(2.5, ease + 0.1);
  } else { // easy
    repetitions++;
    if (repetitions === 1) interval = 4;
    else if (repetitions === 2) interval = 12;
    else interval = Math.round(interval * ease * 1.3);
    ease = Math.min(2.5, ease + 0.15);
  }
  
  const days = quality === "again" ? 0 : quality === "hard" ? 1 : interval;
  return {
    ...card,
    repetitions, interval, ease,
    due: Date.now() + days * 86400000
  };
}

// ============ CARD DISPLAY ============
function pickCard() {
  const cards = deck().cards;
  if (cards.length === 0) {
    currentCardIndex = -1;
    renderEmptyState();
    return;
  }
  
  const now = Date.now();
  const dueCards = cards.filter(c => (c.due || 0) <= now);
  
  if (dueCards.length > 0) {
    currentCardIndex = cards.findIndex(c => c === dueCards[0]);
  } else {
    currentCardIndex = 0;
  }
  
  renderCard();
}

function renderEmptyState() {
  document.getElementById("frontWord").innerHTML = "🎉";
  document.getElementById("frontCategory").innerHTML = "Tebrikler!";
  document.getElementById("frontDiff").innerHTML = "";
  document.getElementById("backWord").innerHTML = "";
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("actionButtons").innerHTML = "";
  document.getElementById("modeBadge").innerHTML = "📭 Hiç kart yok. Yeni kart ekleyin!";
  isFlipped = false;
}

function renderCard() {
  if (currentCardIndex === -1 || currentCardIndex >= deck().cards.length) {
    renderEmptyState();
    return;
  }
  
  const card = deck().cards[currentCardIndex];
  const question = getQuestion(card);
  const answer = getAnswer(card);
  
  // Front
  document.getElementById("frontWord").innerHTML = question;
  document.getElementById("frontCategory").innerHTML = card.category || "Genel";
  document.getElementById("frontDiff").innerHTML = getDiffBadge(card.diffLabel);
  
  // Back
  document.getElementById("backWord").innerHTML = answer;
  document.getElementById("backCategory").innerHTML = card.category || "Genel";
  document.getElementById("backSentence").innerHTML = card.sentence || "";
  document.getElementById("backDiff").innerHTML = getDiffBadge(card.diffLabel);
  
  // Reset flip
  isFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  
  // Render buttons
  renderActionButtons();
  
  // Mode badge
  const modeNames = { normal: "🃏 Normal Mod", test: "✍️ Yazma Testi" };
  const dirNames = { nltr: "🇳🇱 → 🇹🇷", trnl: "🇹🇷 → 🇳🇱" };
  document.getElementById("modeBadge").innerHTML = `${modeNames[app.mode]} · ${dirNames[app.direction]}`;
}

function getDiffBadge(label) {
  if (!label) return "";
  const colors = {
    kolay: '🟢 Kolay',
    orta: '🟡 Orta',
    zor: '🔴 Zor'
  };
  const bgColor = label === 'zor' ? '#fef2f2' : label === 'orta' ? '#fff7ed' : '#f0fdf4';
  const textColor = label === 'zor' ? '#dc2626' : label === 'orta' ? '#ea580c' : '#16a34a';
  return `<span style="background:${bgColor};color:${textColor};padding:4px 12px;border-radius:20px;font-size:11px">${colors[label]}</span>`;
}

function renderActionButtons() {
  const container = document.getElementById("actionButtons");
  
  if (app.mode === "normal") {
    if (!isFlipped) {
      container.innerHTML = `
        <button class="btn btn-primary" onclick="flipCard()">🔄 Kartı Çevir</button>
        <button class="btn btn-secondary" onclick="skipCard()">⏭️ Sonraki</button>
      `;
    } else {
      container.innerHTML = `
        <button class="btn btn-again" onclick="answerCard('again')">🔄 Tekrar (0 gün)</button>
        <button class="btn btn-hard" onclick="answerCard('hard')">⚠️ Zor (1 gün)</button>
        <button class="btn btn-good" onclick="answerCard('good')">✅ İyi (3 gün)</button>
        <button class="btn btn-easy" onclick="answerCard('easy')">⭐ Kolay (7+ gün)</button>
      `;
    }
  } else if (app.mode === "test") {
    const card = deck().cards[currentCardIndex];
    testAnswer = getAnswer(card);
    container.innerHTML = `
      <input type="text" id="testInput" class="test-input" placeholder="Cevabını yaz..." autocomplete="off">
      <button class="btn btn-primary" onclick="checkTestAnswer()">✓ Kontrol Et</button>
      <button class="btn btn-secondary" onclick="skipCard()">⏭️ Sonraki</button>
    `;
    setTimeout(() => {
      const inp = document.getElementById("testInput");
      if (inp) inp.focus();
    }, 100);
  }
}

function flipCard() {
  isFlipped = true;
  document.getElementById("card").classList.add("flipped");
  renderActionButtons();
}

function onCardClick() {
  if (app.mode === "normal" && !isFlipped && currentCardIndex !== -1) {
    flipCard();
  }
}

function skipCard() {
  pickCard();
}

function checkTestAnswer() {
  const input = document.getElementById("testInput");
  if (!input) return;
  const userAnswer = input.value.trim().toLowerCase();
  const correct = testAnswer.toLowerCase();
  
  if (userAnswer === correct) {
    answerCard("good");
  } else {
    alert(`❌ Yanlış! Doğru cevap: ${testAnswer}`);
    answerCard("again");
  }
}

function answerCard(quality) {
  if (currentCardIndex === -1) return;
  
  const card = deck().cards[currentCardIndex];
  const isCorrect = (quality === "good" || quality === "easy");
  
  // Session stats
  if (isCorrect) sessionCorrect++;
  else sessionWrong++;
  
  // Update card
  const updated = updateSM2({...card}, quality);
  updated.correct = (card.correct || 0) + (isCorrect ? 1 : 0);
  updated.wrong = (card.wrong || 0) + (isCorrect ? 0 : 1);
  deck().cards[currentCardIndex] = updated;
  
  // Update streak
  const t = today();
  const streak = app.streak;
  if (streak.lastStudy === t) {
    streak.todayDone++;
  } else {
    streak.todayDone = 1;
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (streak.lastStudy === yesterday.toISOString().slice(0, 10)) {
      streak.current++;
    } else {
      streak.current = 1;
    }
    streak.longest = Math.max(streak.longest, streak.current);
  }
  streak.lastStudy = t;
  streak.totalCards++;
  streak.totalCorrect += isCorrect ? 1 : 0;
  
  save();
  updateStats();
  updateStreakDisplay();
  pickCard();
}

function updateStats() {
  let correct = 0, wrong = 0, due = 0;
  const now = Date.now();
  deck().cards.forEach(c => {
    correct += c.correct || 0;
    wrong += c.wrong || 0;
    if ((c.due || 0) <= now) due++;
  });
  document.getElementById("correctCount").innerHTML = correct;
  document.getElementById("wrongCount").innerHTML = wrong;
  document.getElementById("dueCount").innerHTML = due;
}

function updateStreakDisplay() {
  const s = app.streak;
  document.getElementById("streakDisplay").innerHTML = s.current > 0 ? `🔥 ${s.current}` : "💤 0";
  const pct = Math.min(100, Math.round(s.todayDone / s.dailyGoal * 100));
  document.getElementById("goalDisplay").innerHTML = `📅 ${s.todayDone}/${s.dailyGoal} (${pct}%)`;
}

// ============ DECK MANAGEMENT ============
function updateDeckList() {
  const container = document.getElementById("deckList");
  container.innerHTML = "";
  app.decks.forEach((deck, idx) => {
    const div = document.createElement("div");
    div.className = "deck-item" + (idx === app.currentDeck ? " active" : "");
    div.innerHTML = `${deck.name} (${deck.cards.length} kart)`;
    div.onclick = () => {
      app.currentDeck = idx;
      save();
      updateDeckList();
      pickCard();
      updateStats();
      closeSidebar();
    };
    container.appendChild(div);
  });
}

function createDeck() {
  const name = prompt("Deste adı girin:");
  if (name && name.trim()) {
    app.decks.push({ name: name.trim(), cards: [] });
    app.currentDeck = app.decks.length - 1;
    save();
    updateDeckList();
    pickCard();
    updateStats();
  }
}

function deleteDeck() {
  if (app.decks.length <= 1) {
    alert("En az bir deste olmalı!");
    return;
  }
  if (confirm(`"${deck().name}" deste kalıcı olarak silinsin mi?`)) {
    app.decks.splice(app.currentDeck, 1);
    app.currentDeck = 0;
    save();
    updateDeckList();
    pickCard();
    updateStats();
  }
}

function changeDirection() {
  app.direction = document.getElementById("directionSelect").value;
  save();

function changeMode() {

// ============ CARD ADD ============
function openAddCardModal() {
  document.getElementById("addCardModal").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("newWord").focus();
}

function closeAddCardModal() {
  document.getElementById("addCardModal").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("newWord").value = "";
  document.getElementById("newMeaning").value = "";
  document.getElementById("newSentence").value = "";
}

function addCard() {
  const word = document.getElementById("newWord").value.trim();
  const meaning = document.getElementById("newMeaning").value.trim();
  if (!word || !meaning) {
    alert("Kelime ve anlam zorunludur!");
    return;
  }
  const sentence = document.getElementById("newSentence").value.trim();
  const category = document.getElementById("newCategory").value;
  const diffLabel = document.getElementById("newDiff").value;
  
  deck().cards.push({
    word, meaning, sentence, category, diffLabel,
    correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5,
    due: Date.now(), history: []
  });
  save();
  updateDeckList();
  pickCard();
  updateStats();
  closeAddCardModal();
}

// ============ CSV IMPORT ============
function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.split(/\r?\n/);
    let count = 0;
    for (let i = 1; i < lines.length; i++) {
      const parts = lines[i].split(";");
      if (parts.length >= 2) {
        const word = parts[0]?.trim();
        const meaning = parts[1]?.trim();
        if (word && meaning) {
          deck().cards.push({
            word, meaning,
            sentence: parts[2]?.trim() || "",
            category: parts[4]?.trim() || "Genel",
            diffLabel: parts[5]?.trim() || "",
            correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5,
            due: Date.now(), history: []
          });
          count++;
        }
      }
    }
    save();
    updateDeckList();
    pickCard();
    updateStats();
    alert(`✅ ${count} kart başarıyla yüklendi!`);
  };
  reader.readAsText(file, "UTF-8");
  input.value = "";
}

// ============ ANALYSIS ============
function openAnalysis() {
  const cards = deck().cards;
  let correct = 0, wrong = 0;
  cards.forEach(c => {
    correct += c.correct || 0;
    wrong += c.wrong || 0;
  });
  const total = correct + wrong;
  const percent = total ? Math.round(correct / total * 100) : 0;
  
  document.getElementById("analysisContent").innerHTML = `
    <div style="text-align:center">
      <div style="font-size:48px;color:#16a34a;font-weight:bold">${correct}</div>
      <div>✅ Doğru</div>
      <div style="font-size:48px;color:#dc2626;font-weight:bold;margin-top:16px">${wrong}</div>
      <div>❌ Yanlış</div>
      <div style="font-size:32px;font-weight:bold;margin-top:20px">📊 ${percent}%</div>
      <div>Başarı Oranı</div>
      <div style="margin-top:20px;font-size:12px;color:#666">📚 Toplam ${cards.length} kart</div>
    </div>
  `;
  document.getElementById("analysisModal").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeAnalysis() {
  document.getElementById("analysisModal").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

// ============ MANAGER ============
function openManager() {
  const cards = deck().cards;
  if (cards.length === 0) {
    document.getElementById("managerContent").innerHTML = "<p style='text-align:center'>Henüz kart yok</p>";
  } else {
    let html = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:2px solid #ddd"><th>Kelime</th><th>Anlam</th><th>Kategori</th><th>Doğru</th><th>Yanlış</th><th></th></tr></thead>
      <tbody>`;
    cards.forEach((card, idx) => {
      html += `<tr style="border-bottom:1px solid #eee">
        <td style="padding:8px">${card.word}</td>
        <td style="padding:8px">${card.meaning}</td>
        <td style="padding:8px">${card.category || "Genel"}</td>
        <td style="padding:8px;color:#16a34a">${card.correct || 0}</td>
        <td style="padding:8px;color:#dc2626">${card.wrong || 0}</td>
        <td style="padding:8px"><button onclick="deleteCardFromManager(${idx})" style="background:#dc2626;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer">🗑 Sil</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById("managerContent").innerHTML = html;
  }
  document.getElementById("managerModal").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeManager() {
  document.getElementById("managerModal").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function deleteCardFromManager(idx) {
  if (confirm("Bu kart silinsin mi?")) {
    deck().cards.splice(idx, 1);
    save();
    updateDeckList();
    pickCard();
    updateStats();
    openManager(); // Refresh manager view
  }
}

  document.getElementById("overlay").classList.add("open");
}

function closeSidebar() {
