<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LinguaPrime v9 - Yedeklemeli</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f0f5;
  color: #1c1c1e;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  background: white;
  padding: 12px 16px;
  border-bottom: 1px solid #e5e5ea;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.streak-box {
  display: flex;
  align-items: center;
  gap: 12px;
}

.streak {
  background: #f97316;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

.goal {
  font-size: 12px;
  color: #666;
  background: #f3f4f6;
  padding: 6px 12px;
  border-radius: 20px;
}

.stats {
  display: flex;
  gap: 12px;
}

.stat {
  background: #e8e8ed;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
}

.sidebar {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background: #1c1c1e;
  color: white;
  transition: left 0.3s ease;
  z-index: 1000;
  padding: 20px;
  overflow-y: auto;
}

.sidebar.open {
  left: 0;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
}

.overlay.open {
  display: block;
}

.menu-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
}

.sidebar h3 {
  margin-bottom: 16px;
  font-size: 18px;
}

.sidebar h4 {
  margin: 20px 0 8px 0;
  font-size: 14px;
  color: #aaa;
}

.sidebar button, .sidebar select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  background: #2c2c2e;
  color: white;
  cursor: pointer;
}

.sidebar button.primary {
  background: #4f46e5;
}

.sidebar button.danger {
  background: #dc2626;
}

.sidebar button.warning {
  background: #ea580c;
}

.deck-list {
  margin: 10px 0;
}

.deck-item {
  background: #2c2c2e;
  text-align: left;
  padding: 10px;
  margin: 4px 0;
  border-radius: 8px;
  cursor: pointer;
}

.deck-item.active {
  background: #4f46e5;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card-container {
  width: 100%;
  max-width: 520px;
  margin: 20px auto;
  cursor: pointer;
  perspective: 1000px;
}

.card {
  background: white;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  transition: transform 0.5s ease;
  min-height: 320px;
  position: relative;
  transform-style: preserve-3d;
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  width: 100%;
  backface-visibility: hidden;
  border-radius: 24px;
  padding: 40px 24px;
  position: absolute;
  top: 0;
  left: 0;
}

.card-back {
  transform: rotateY(180deg);
}

.card-word {
  font-size: 32px;
  font-weight: bold;
  margin: 16px 0;
}

.card-category {
  font-size: 12px;
  color: #888;
  margin-bottom: 8px;
}

.card-sentence {
  font-size: 14px;
  color: #666;
  font-style: italic;
  margin-top: 16px;
}

.diff-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
}

.button-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s ease;
}

.btn:active {
  transform: scale(0.96);
}

.btn-primary {
  background: #4f46e5;
  color: white;
}

.btn-secondary {
  background: #e8e8ed;
  color: #333;
}

.btn-again {
  background: #dc2626;
  color: white;
}

.btn-hard {
  background: #ea580c;
  color: white;
}

.btn-good {
  background: #16a34a;
  color: white;
}

.btn-easy {
  background: #4f46e5;
  color: white;
}

.test-input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 24px;
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  z-index: 1001;
  display: none;
}

.modal.open {
  display: block;
}

.modal input, .modal select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.mode-badge {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 20px;
}

body.dark {
  background: #1a1a1e;
  color: #f5f5f5;
}

body.dark .header {
  background: #2c2c2e;
  border-color: #3a3a3c;
}

body.dark .card {
  background: #2c2c2e;
  color: #f5f5f5;
}

body.dark .stat, body.dark .goal {
  background: #3a3a3c;
  color: #f5f5f5;
}

body.dark .btn-secondary {
  background: #3a3a3c;
  color: #f5f5f5;
}

body.dark .modal {
  background: #2c2c2e;
  color: #f5f5f5;
}

body.dark .modal input, body.dark .modal select {
  background: #3a3a3c;
  color: #f5f5f5;
  border-color: #555;
}

@media (max-width: 600px) {
  .card-word { font-size: 24px; }
  .btn { padding: 10px 16px; font-size: 12px; }
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  z-index: 2000;
  animation: fadeOut 2s ease forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <h3>🗂️ LinguaPrime v9</h3>
  <button onclick="closeSidebar()">✕ Kapat</button>
  
  <h4>📚 Desteler</h4>
  <div id="deckList" class="deck-list"></div>
  <button onclick="createDeck()">➕ Yeni Deste</button>
  <button onclick="deleteDeck()" style="background:#dc2626">🗑 Sil Deste</button>
  
  <h4>⚙️ Ayarlar</h4>
  <select id="directionSelect" onchange="changeDirection()">
    <option value="nltr">🇳🇱 NL → TR</option>
    <option value="trnl">🇹🇷 TR → NL</option>
  </select>
  <select id="modeSelect" onchange="changeMode()">
    <option value="normal">🃏 Normal Mod</option>
    <option value="test">✍️ Yazma Testi</option>
  </select>
  
  <h4>📋 Kartlar</h4>
  <button class="primary" onclick="openAddCardModal()">✍️ Kart Ekle</button>
  <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV(this)">
  <button onclick="document.getElementById('csvFile').click()">📂 CSV Yükle</button>
  <button onclick="exportCSV()">📤 CSV İndir</button>
  
  <h4>💾 Yedekleme</h4>
  <button onclick="backupData()">📥 Tüm Verileri Yedekle</button>
  <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreData(this)">
  <button onclick="document.getElementById('restoreFile').click()">🔄 Yedekten Geri Yükle</button>
  <button onclick="resetAllData()" class="danger" style="background:#dc2626">🗑️ Tüm Verileri Sıfırla</button>
  
  <h4>📊 Araçlar</h4>
  <button onclick="openAnalysis()">📊 Analiz</button>
  <button onclick="openManager()">📋 Kart Yönetimi</button>
  <button onclick="toggleTheme()">🌙 Koyu Tema</button>
</div>

<div class="header">
  <div><button class="menu-btn" onclick="openSidebar()">☰</button></div>
  <div class="streak-box">
    <div class="streak" id="streakDisplay">🔥 0</div>
    <div class="goal" id="goalDisplay">📅 0/20</div>
  </div>
  <div class="stats">
    <div class="stat">✅ <span id="correctCount">0</span></div>
    <div class="stat">❌ <span id="wrongCount">0</span></div>
    <div class="stat">⏳ <span id="dueCount">0</span></div>
  </div>
</div>

<div class="main">
  <div class="card-container" onclick="onCardClick()">
    <div class="card" id="card">
      <div class="card-front" id="cardFront">
        <div class="card-category" id="frontCategory">Kategori</div>
        <div class="card-word" id="frontWord">Yükleniyor...</div>
        <div class="diff-badge" id="frontDiff"></div>
      </div>
      <div class="card-back" id="cardBack">
        <div class="card-category" id="backCategory">Kategori</div>
        <div class="card-word" id="backWord"></div>
        <div class="card-sentence" id="backSentence"></div>
        <div class="diff-badge" id="backDiff"></div>
      </div>
    </div>
  </div>
  <div id="actionButtons" class="button-group"></div>
  <div class="mode-badge" id="modeBadge"></div>
</div>

<div class="modal" id="addCardModal">
  <h3>✍️ Yeni Kart</h3>
  <input type="text" id="newWord" placeholder="Kelime (NL)">
  <input type="text" id="newMeaning" placeholder="Anlam (TR)">
  <input type="text" id="newSentence" placeholder="Örnek Cümle">
  <select id="newCategory"><option>Genel</option><option>Fiiller</option><option>Hayvanlar</option><option>Ev</option><option>Yiyecekler</option><option>Meslekler</option></select>
  <select id="newDiff"><option value="">Zorluk Yok</option><option value="kolay">🟢 Kolay</option><option value="orta">🟡 Orta</option><option value="zor">🔴 Zor</option></select>
  <button class="btn btn-primary" onclick="addCard()">➕ Ekle</button>
  <button class="btn btn-secondary" onclick="closeAddCardModal()">İptal</button>
</div>

<div class="modal" id="analysisModal">
  <h3>📊 Analiz</h3>
  <div id="analysisContent"></div>
  <button class="btn btn-secondary" onclick="closeAnalysis()">Kapat</button>
</div>

<div class="modal" id="managerModal">
  <h3>📋 Kart Yönetimi</h3>
  <div id="managerContent"></div>
  <button class="btn btn-secondary" onclick="closeManager()">Kapat</button>
</div>

<script>
// ============================================
// LINGUAPRIME V9 - WITH BACKUP
// ============================================

let app = {
  decks: [],
  currentDeck: 0,
  direction: "nltr",
  mode: "normal",
  streak: { current: 0, longest: 0, lastStudy: "", todayDone: 0, dailyGoal: 20, totalCards: 0, totalCorrect: 0 }
};

let currentCardIndex = -1;
let isFlipped = false;
let testAnswer = "";

function showToast(msg) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function save() { localStorage.setItem("linguaPrime", JSON.stringify(app)); }

function load() {
  const saved = localStorage.getItem("linguaPrime");
  if (saved) {
    try {
      const data = JSON.parse(saved);
      app.decks = data.decks || [];
      app.currentDeck = data.currentDeck || 0;
      app.direction = data.direction || "nltr";
      app.mode = data.mode || "normal";
      app.streak = data.streak || { current:0, longest:0, lastStudy:"", todayDone:0, dailyGoal:20, totalCards:0, totalCorrect:0 };
    } catch(e) {}
  }
  if (app.decks.length === 0) app.decks = [{ name: "Genel", cards: [] }];
  if (app.decks[app.currentDeck].cards.length === 0) addSampleCards();
  updateUI();
  pickCard();
  updateStats();
  updateStreakDisplay();
}

function addSampleCards() {
  const now = Date.now();
  app.decks[app.currentDeck].cards.push(
    { word: "lopen", meaning: "yürümek", sentence: "Ik loop naar huis.", category: "Fiiller", diffLabel: "kolay", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: now - 86400000, history:[] },
    { word: "fietsen", meaning: "bisiklet sürmek", sentence: "Wij fietsen naar school.", category: "Fiiller", diffLabel: "kolay", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: now - 86400000, history:[] },
    { word: "de hond", meaning: "köpek", sentence: "De hond blaft.", category: "Hayvanlar", diffLabel: "kolay", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: now - 86400000, history:[] },
    { word: "het huis", meaning: "ev", sentence: "Het huis is groot.", category: "Ev", diffLabel: "orta", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: now - 86400000, history:[] },
    { word: "eten", meaning: "yemek yemek", sentence: "Ik eet een appel.", category: "Fiiller", diffLabel: "kolay", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: now - 86400000, history:[] }
  );
  save();
}

function deck() { return app.decks[app.currentDeck]; }
function today() { return new Date().toISOString().slice(0,10); }
function getQuestion(c) { return app.direction === "nltr" ? c.word : c.meaning; }
function getAnswer(c) { return app.direction === "nltr" ? c.meaning : c.word; }

function updateSM2(card, quality) {
  let { repetitions, interval, ease } = card;
  if (quality === "again") { repetitions = 0; interval = 1; ease = Math.max(1.3, ease - 0.2); }
  else if (quality === "hard") { repetitions = 1; interval = 1; ease = Math.max(1.3, ease - 0.15); }
  else if (quality === "good") {
    repetitions++;
    if (repetitions === 1) interval = 1;
    else if (repetitions === 2) interval = 6;
    else interval = Math.round(interval * ease);
    ease = Math.min(2.5, ease + 0.1);
  } else {
    repetitions++;
    if (repetitions === 1) interval = 4;
    else if (repetitions === 2) interval = 12;
    else interval = Math.round(interval * ease * 1.3);
    ease = Math.min(2.5, ease + 0.15);
  }
  const days = quality === "again" ? 0 : quality === "hard" ? 1 : interval;
  return { ...card, repetitions, interval, ease, due: Date.now() + days * 86400000 };
}

function pickCard() {
  const cards = deck().cards;
  if (cards.length === 0) { currentCardIndex = -1; renderEmptyState(); return; }
  const now = Date.now();
  const dueCards = cards.filter(c => (c.due || 0) <= now);
  currentCardIndex = dueCards.length > 0 ? cards.findIndex(c => c === dueCards[0]) : 0;
  renderCard();
}

function renderEmptyState() {
  document.getElementById("frontWord").innerHTML = "🎉";
  document.getElementById("frontCategory").innerHTML = "Tebrikler!";
  document.getElementById("frontDiff").innerHTML = "";
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("actionButtons").innerHTML = "";
  document.getElementById("modeBadge").innerHTML = "📭 Hiç kart yok. Yeni kart ekleyin!";
  isFlipped = false;
}

function renderCard() {
  if (currentCardIndex === -1 || currentCardIndex >= deck().cards.length) { renderEmptyState(); return; }
  const card = deck().cards[currentCardIndex];
  document.getElementById("frontWord").innerHTML = getQuestion(card);
  document.getElementById("frontCategory").innerHTML = card.category || "Genel";
  document.getElementById("frontDiff").innerHTML = getDiffBadge(card.diffLabel);
  document.getElementById("backWord").innerHTML = getAnswer(card);
  document.getElementById("backCategory").innerHTML = card.category || "Genel";
  document.getElementById("backSentence").innerHTML = card.sentence || "";
  document.getElementById("backDiff").innerHTML = getDiffBadge(card.diffLabel);
  isFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  renderActionButtons();
  const modeNames = { normal: "🃏 Normal Mod", test: "✍️ Yazma Testi" };
  const dirNames = { nltr: "🇳🇱 → 🇹🇷", trnl: "🇹🇷 → 🇳🇱" };
  document.getElementById("modeBadge").innerHTML = `${modeNames[app.mode]} · ${dirNames[app.direction]}`;
}

function getDiffBadge(label) {
  if (!label) return "";
  const colors = { kolay: '🟢 Kolay', orta: '🟡 Orta', zor: '🔴 Zor' };
  const bg = label === 'zor' ? '#fef2f2' : label === 'orta' ? '#fff7ed' : '#f0fdf4';
  const col = label === 'zor' ? '#dc2626' : label === 'orta' ? '#ea580c' : '#16a34a';
  return `<span style="background:${bg};color:${col};padding:4px 12px;border-radius:20px;font-size:11px">${colors[label]}</span>`;
}

function renderActionButtons() {
  const container = document.getElementById("actionButtons");
  if (app.mode === "normal") {
    if (!isFlipped) {
      container.innerHTML = `<button class="btn btn-primary" onclick="flipCard()">🔄 Kartı Çevir</button><button class="btn btn-secondary" onclick="skipCard()">⏭️ Sonraki</button>`;
    } else {
      container.innerHTML = `<button class="btn btn-again" onclick="answerCard('again')">🔄 Tekrar</button><button class="btn btn-hard" onclick="answerCard('hard')">⚠️ Zor</button><button class="btn btn-good" onclick="answerCard('good')">✅ İyi</button><button class="btn btn-easy" onclick="answerCard('easy')">⭐ Kolay</button>`;
    }
  } else {
    const card = deck().cards[currentCardIndex];
    testAnswer = getAnswer(card);
    container.innerHTML = `<input type="text" id="testInput" class="test-input" placeholder="Cevabını yaz..."><button class="btn btn-primary" onclick="checkTestAnswer()">✓ Kontrol Et</button><button class="btn btn-secondary" onclick="skipCard()">⏭️ Sonraki</button>`;
    setTimeout(() => { const inp = document.getElementById("testInput"); if(inp) inp.focus(); }, 100);
  }
}

function flipCard() { isFlipped = true; document.getElementById("card").classList.add("flipped"); renderActionButtons(); }
function onCardClick() { if (app.mode === "normal" && !isFlipped && currentCardIndex !== -1) flipCard(); }
function skipCard() { pickCard(); }

function checkTestAnswer() {
  const input = document.getElementById("testInput");
  if (!input) return;
  if (input.value.trim().toLowerCase() === testAnswer.toLowerCase()) answerCard("good");
  else { alert(`❌ Yanlış! Doğru: ${testAnswer}`); answerCard("again"); }
}

function answerCard(quality) {
  if (currentCardIndex === -1) return;
  const card = deck().cards[currentCardIndex];
  const isCorrect = (quality === "good" || quality === "easy");
  
  const updated = updateSM2({...card}, quality);
  updated.correct = (card.correct || 0) + (isCorrect ? 1 : 0);
  updated.wrong = (card.wrong || 0) + (isCorrect ? 0 : 1);
  deck().cards[currentCardIndex] = updated;
  
  const t = today();
  const s = app.streak;
  if (s.lastStudy === t) s.todayDone++;
  else { s.todayDone = 1; const y = new Date(); y.setDate(y.getDate()-1); s.current = (s.lastStudy === y.toISOString().slice(0,10)) ? s.current+1 : 1; s.longest = Math.max(s.longest, s.current); }
  s.lastStudy = t;
  s.totalCards++;
  s.totalCorrect += isCorrect ? 1 : 0;
  
  save();
  updateStats();
  updateStreakDisplay();
  pickCard();
}

function updateStats() {
  let c=0,w=0,d=0,n=Date.now();
  deck().cards.forEach(card => { c+=card.correct||0; w+=card.wrong||0; if((card.due||0)<=n) d++; });
  document.getElementById("correctCount").innerHTML = c;
  document.getElementById("wrongCount").innerHTML = w;
  document.getElementById("dueCount").innerHTML = d;
}

function updateStreakDisplay() {
  const s = app.streak;
  document.getElementById("streakDisplay").innerHTML = s.current > 0 ? `🔥 ${s.current}` : "💤 0";
  document.getElementById("goalDisplay").innerHTML = `📅 ${s.todayDone}/${s.dailyGoal}`;
}

function updateDeckList() {
  const container = document.getElementById("deckList");
  container.innerHTML = "";
  app.decks.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "deck-item" + (i === app.currentDeck ? " active" : "");
    div.innerHTML = `${d.name} (${d.cards.length})`;
    div.onclick = () => { app.currentDeck = i; save(); updateDeckList(); pickCard(); updateStats(); closeSidebar(); };
    container.appendChild(div);
  });
}

function createDeck() { const n = prompt("Deste adı:"); if(n && n.trim()) { app.decks.push({ name: n.trim(), cards: [] }); app.currentDeck = app.decks.length-1; save(); updateDeckList(); pickCard(); updateStats(); showToast(`✅ "${n.trim()}" deste oluşturuldu`); } }
function deleteDeck() { if(app.decks.length<=1) { alert("En az bir deste olmalı!"); return; } if(confirm(`"${deck().name}" silinsin mi?`)) { app.decks.splice(app.currentDeck,1); app.currentDeck=0; save(); updateDeckList(); pickCard(); updateStats(); showToast(`🗑️ "${deck().name}" silindi`); } }
function changeDirection() { app.direction = document.getElementById("directionSelect").value; save(); pickCard(); }
function changeMode() { app.mode = document.getElementById("modeSelect").value; save(); pickCard(); }
function openAddCardModal() { document.getElementById("addCardModal").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeAddCardModal() { document.getElementById("addCardModal").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); document.getElementById("newWord").value = ""; document.getElementById("newMeaning").value = ""; document.getElementById("newSentence").value = ""; }
function addCard() {
  const w = document.getElementById("newWord").value.trim();
  const m = document.getElementById("newMeaning").value.trim();
  if(!w || !m) { alert("Kelime ve anlam zorunlu!"); return; }
  deck().cards.push({ word: w, meaning: m, sentence: document.getElementById("newSentence").value.trim(), category: document.getElementById("newCategory").value, diffLabel: document.getElementById("newDiff").value, correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due: Date.now(), history:[] });
  save(); updateDeckList(); pickCard(); updateStats(); closeAddCardModal(); showToast(`✅ "${w}" eklendi`);
}
function importCSV(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { let c=0; e.target.result.split(/\r?\n/).forEach((line,i)=>{ if(i===0) return; const p=line.split(";"); if(p.length>=2 && p[0].trim() && p[1].trim()) { deck().cards.push({ word:p[0].trim(), meaning:p[1].trim(), sentence:p[2]?.trim()||"", category:p[4]?.trim()||"Genel", diffLabel:p[5]?.trim()||"", correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due:Date.now(), history:[] }); c++; } }); save(); updateDeckList(); pickCard(); updateStats(); showToast(`✅ ${c} kart yüklendi!`); };
  reader.readAsText(file,"UTF-8"); input.value="";
}
function exportCSV() {
  let csv = "kelime;anlam;cümle;zıt anlam;kategori;etiket;grammar_type;unite\n";
  deck().cards.forEach(c => { csv += `${c.word};${c.meaning};${c.sentence||""};;${c.category||"Genel"};${c.diffLabel||""};;\n`; });
  const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${deck().name}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast("📤 CSV indiriliyor");
}
function backupData() {
  const data = JSON.stringify(app);
  const blob = new Blob([data], {type: "application/json"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `linguaprime_yedek_${new Date().toISOString().slice(0,19).replace(/:/g, "-")}.json`;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast("💾 Yedek alındı");
}
function restoreData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      app.decks = data.decks || [{ name: "Genel", cards: [] }];
      app.currentDeck = data.currentDeck || 0;
      app.direction = data.direction || "nltr";
      app.mode = data.mode || "normal";
      app.streak = data.streak || { current:0, longest:0, lastStudy:"", todayDone:0, dailyGoal:20, totalCards:0, totalCorrect:0 };
      save();
      updateUI();
      pickCard();
      updateStats();
      updateStreakDisplay();
      showToast("🔄 Yedek başarıyla geri yüklendi!");
    } catch(err) { alert("Geçersiz yedek dosyası!"); }
  };
  reader.readAsText(file);
  input.value = "";
}
function resetAllData() {
  if(confirm("⚠️ TÜM VERİLER KALICI OLARAK SİLİNECEK! Devam etmek istiyor musunuz?")) {
    localStorage.removeItem("linguaPrime");
    app = { decks: [{ name: "Genel", cards: [] }], currentDeck: 0, direction: "nltr", mode: "normal", streak: { current:0, longest:0, lastStudy:"", todayDone:0, dailyGoal:20, totalCards:0, totalCorrect:0 } };
    addSampleCards();
    updateUI();
    pickCard();
    updateStats();
    updateStreakDisplay();
    showToast("🗑️ Tüm veriler sıfırlandı");
  }
}
function openAnalysis() {
  let c=0,w=0;
  deck().cards.forEach(card => { c+=card.correct||0; w+=card.wrong||0; });
  const tot=c+w, pct=tot?Math.round(c/tot*100):0;
  document.getElementById("analysisContent").innerHTML = `<div style="text-align:center"><div style="font-size:48px;color:#16a34a;font-weight:bold">${c}</div><div>✅ Doğru</div><div style="font-size:48px;color:#dc2626;font-weight:bold;margin-top:16px">${w}</div><div>❌ Yanlış</div><div style="font-size:32px;font-weight:bold;margin-top:20px">📊 ${pct}%</div><div>Başarı</div><div style="margin-top:20px;font-size:12px;color:#666">📚 Toplam ${deck().cards.length} kart</div></div>`;
  document.getElementById("analysisModal").classList.add("open"); document.getElementById("overlay").classList.add("open");
}
function closeAnalysis() { document.getElementById("analysisModal").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }
function openManager() {
  const cards = deck().cards;
  if(cards.length===0) { document.getElementById("managerContent").innerHTML = "<p>Henüz kart yok</p>"; }
  else { let html = `<table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:2px solid #ddd"><th>Kelime</th><th>Anlam</th><th>Kategori</th><th>Doğru</th><th>Yanlış</th><th></th></tr></thead><tbody>`;
    cards.forEach((c,i)=>{ html += `<tr style="border-bottom:1px solid #eee"><td style="padding:8px">${c.word}</td><td style="padding:8px">${c.meaning}</td><td style="padding:8px">${c.category||"Genel"}</td><td style="padding:8px;color:#16a34a">${c.correct||0}</td><td style="padding:8px;color:#dc2626">${c.wrong||0}</td><td style="padding:8px"><button onclick="deleteCardFromManager(${i})" style="background:#dc2626;color:white;border:none;padding:6px 12px;border-radius:8px">🗑 Sil</button></td></tr>`; });
    html += `</tbody></table>`; document.getElementById("managerContent").innerHTML = html;
  }
  document.getElementById("managerModal").classList.add("open"); document.getElementById("overlay").classList.add("open");
}
function closeManager() { document.getElementById("managerModal").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }
function deleteCardFromManager(i) { if(confirm("Silinsin mi?")) { deck().cards.splice(i,1); save(); updateDeckList(); pickCard(); updateStats(); openManager(); showToast("🗑️ Kart silindi"); } }
function openSidebar() { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }
function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light"); }
function updateUI() { document.getElementById("directionSelect").value = app.direction; document.getElementById("modeSelect").value = app.mode; updateDeckList(); }

if(localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
load();
</script>
</body>
</html>
