<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>LinguaPrime Ultimate | Kusursuz Arena</title>
<style>
/* ARENA VE GBT ORIJINAL TASARIM */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#0A0A0F;color:#F1F3F5;height:100dvh;overflow:hidden;transition:background 0.3s;}
body.light{background:#F3F4F6;color:#1F2937;}

.menu-btn{position:fixed;top:calc(12px + env(safe-area-inset-top));left:16px;z-index:1100;width:44px;height:44px;border-radius:14px;background:rgba(26,26,36,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
body.light .menu-btn{background:rgba(255,255,255,0.8);color:#1F2937;}

.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#0F0F14;border-right:1px solid rgba(255,255,255,0.06);transform:translateX(-100%);transition:transform 0.25s ease;z-index:1300;display:flex;flex-direction:column;padding-top:calc(16px + env(safe-area-inset-top));}
.sidebar.open{transform:translateX(0);}
body.light .sidebar{background:#FFF;border-right:1px solid #E5E7EB;}

.sidebar-header{padding:20px 16px;font-size:18px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);}
.sidebar-item{padding:12px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;transition:0.2s;}
.sidebar-item.active{background:#F97316;color:#0A0A0F;font-weight:600;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1200;display:none;backdrop-filter:blur(4px);}
.overlay.show{display:block;}

.main{height:100%;display:flex;flex-direction:column;overflow:hidden;}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card-container{width:100%;max-width:560px;perspective:1200px;}

.card{width:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);cursor:pointer;border-radius:32px;}
.card.flipped{transform:rotateY(180deg);}

.card-face{backface-visibility:hidden;background:rgba(26,26,36,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:32px;padding:28px 20px;min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow: 0 15px 35px rgba(0,0,0,0.4);}
.card-back{transform:rotateY(180deg);position:absolute;inset:0;}

.word{font-size:36px;font-weight:700;margin:16px 0;}
.sentence{font-size:16px;opacity:0.7;margin-top:10px;font-style:italic;}
.badge{background:rgba(255,255,255,0.06);padding:6px 14px;border-radius:24px;font-size:11px;text-transform:uppercase;}

.action-bar{display:flex;gap:8px;padding:15px;max-width:560px;margin:0 auto;width:100%;}
.action-btn{flex:1;padding:12px;border-radius:18px;background:#1A1A24;border:none;color:white;font-weight:600;cursor:pointer;font-size:12px;}
.action-btn.again{border-bottom:4px solid #EF4444;}
.action-btn.hard{border-bottom:4px solid #F97316;}
.action-btn.good{border-bottom:4px solid #22C55E;}
.action-btn.easy{border-bottom:4px solid #3B82F6;}

.mode-bar{display:flex;gap:6px;justify-content:center;padding:10px;flex-wrap:wrap;}
.mode-btn{padding:8px 15px;border-radius:12px;font-size:11px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;cursor:pointer;}
.mode-btn.active{background:#F97316;color:black;border:none;}

.tts-btn{margin-top:15px;background:rgba(249,115,22,0.1);color:#F97316;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;}
.kalan-sayac{font-size:12px;color:#9CA3AF;margin-bottom:8px;}

/* İNTERAKTİF ALANLAR */
#dropZone{min-height:55px; border:2px dashed rgba(255,255,255,0.1); border-radius:16px; margin:15px 0; padding:10px; width:100%; display:flex; flex-wrap:wrap; gap:6px; justify-content:center;}
.drag-word{background:rgba(255,255,255,0.07); padding:7px 12px; border-radius:10px; cursor:pointer; font-size:13px;}
#dragWords{display:flex; flex-wrap:wrap; gap:6px; justify-content:center;}
.test-input{width:100%; max-width:300px; padding:12px; border-radius:14px; background:#0A0A0F; border:1px solid #333; color:white; text-align:center; font-size:16px; margin-top:10px;}
</style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">LinguaPrime</div>
  <div id="deckListSidebar" style="flex:1;overflow-y:auto;"></div>
  <div class="sidebar-item" onclick="addNewDeck()">➕ Yeni Deste</div>
  <div class="sidebar-item" onclick="toggleTheme()">🌓 Temayı Değiştir</div>
</div>

<div class="main">
  <div class="card-area">
    <div id="progressText" class="kalan-sayac">0 kart kaldı</div>
    <div class="card-container">
      <div class="card" id="card">
        <div class="card-face">
          <div class="badge" id="frontCat">KATEGORİ</div>
          <div class="word" id="frontWord">Yükleniyor...</div>
          <div class="sentence" id="frontSentence"></div>
          <div id="interactiveArea"></div>
          <button class="tts-btn" id="ttsFront">🔊</button>
        </div>
        <div class="card-face card-back">
          <div class="badge">CEVAP</div>
          <div class="word" id="backWord">...</div>
          <div class="sentence" id="backSentence"></div>
          <button class="tts-btn" id="ttsBack">🔊</button>
        </div>
      </div>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="normal">Normal</button>
    <button class="mode-btn" data-mode="test">Test</button>
    <button class="mode-btn" data-mode="drag">Sürükle</button>
  </div>

  <div class="action-bar">
    <button class="action-btn again" data-ans="again">Tekrar</button>
    <button class="action-btn hard" data-ans="hard">Zor</button>
    <button class="action-btn good" data-ans="good">İyi</button>
    <button class="action-btn easy" data-ans="easy">Kolay</button>
  </div>
</div>

<script>
/* DATA & STORAGE */
let appData = {
  decks: [{id: "1", name: "Genel"}],
  currentDeckId: "1",
  cards: [],
  settings: { mode: "normal", theme: "dark" }
};

function save() { localStorage.setItem("lp_v8_final", JSON.stringify(appData)); }
function load() {
  const d = localStorage.getItem("lp_v8_final");
  if(d) appData = JSON.parse(d);
}

/* KLAVYE DOSTU NORMALİZASYON */
function normalize(str) {
  if(!str) return "";
  const m = {'İ':'i','I':'i','ı':'i','Ş':'s','ş':'s','Ğ':'g','ğ':'g','Ü':'u','ü':'u','Ö':'o','ö':'o','Ç':'c','ç':'c'};
  let text = str.toString();
  Object.keys(m).forEach(k => text = text.replace(new RegExp(k, 'g'), m[k]));
  return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_~()?"']/g, "").replace(/\s+/g, " ").trim();
}

let currentCard = null;

function nextCard() {
  const now = Date.now();
  const due = appData.cards.filter(c => c.deckId === appData.currentDeckId && (c.due || 0) <= now);
  document.getElementById("progressText").innerText = `${due.length} kart kaldı`;
  
  const cardEl = document.getElementById("card");
  cardEl.classList.remove("flipped");

  if(due.length === 0) {
    document.getElementById("frontWord").innerText = "Tebrikler! Bitti.";
    document.getElementById("frontSentence").innerText = "Bugünlük tüm kartları tamamladın.";
    document.getElementById("interactiveArea").innerHTML = "";
    currentCard = null; return;
  }
  
  currentCard = due[0];
  renderCardContent();
}

function renderCardContent() {
  document.getElementById("frontWord").innerText = currentCard.word;
  document.getElementById("backWord").innerText = currentCard.meaning;
  document.getElementById("frontCat").innerText = currentCard.category || "KELİME";
  document.getElementById("frontSentence").innerText = currentCard.sentence || "";
  document.getElementById("backSentence").innerText = currentCard.sentence || "";
  
  const area = document.getElementById("interactiveArea");
  area.innerHTML = "";

  if(appData.settings.mode === "test") {
    const inp = document.createElement("input");
    inp.className = "test-input"; 
    inp.placeholder = "Cevabı yazın...";
    inp.onkeyup = (e) => { if(e.key === "Enter") checkTest(inp.value); };
    area.appendChild(inp);
    inp.focus();
  } else if(appData.settings.mode === "drag" && currentCard.sentence) {
    renderDrag();
  }
}

function checkTest(val) {
  if(normalize(val) === normalize(currentCard.meaning)) {
    handleAnswer('good');
  } else {
    alert("Yanlış! Doğru cevap: " + currentCard.meaning);
    handleAnswer('again');
  }
}

function renderDrag() {
  const area = document.getElementById("interactiveArea");
  area.innerHTML = `<div id="dropZone"></div><div id="dragWords"></div>`;
  const words = currentCard.sentence.split(" ").sort(() => Math.random() - 0.5);
  
  words.forEach(w => {
    const s = document.createElement("span");
    s.className = "drag-word";
    s.innerText = w;
    s.onclick = (e) => {
      e.stopPropagation();
      if(s.parentElement.id === "dragWords") document.getElementById("dropZone").appendChild(s);
      else document.getElementById("dragWords").appendChild(s);
      
      const user = Array.from(document.getElementById("dropZone").children).map(x => x.innerText).join(" ");
      if(normalize(user) === normalize(currentCard.sentence)) {
        setTimeout(() => handleAnswer('good'), 500);
      }
    };
    document.getElementById("dragWords").appendChild(s);
  });
}

function handleAnswer(q) {
  if(!currentCard) return;
  const qMap = {again: 1, hard: 3, good: 4, easy: 5};
  let qual = qMap[q];
  if(!currentCard.reps) currentCard.reps = 0;
  if(!currentCard.ease) currentCard.ease = 2.5;
  if(!currentCard.iv) currentCard.iv = 1;

  if(qual < 3) { 
    currentCard.reps = 0; 
    currentCard.iv = 1; 
  } else {
    if(currentCard.reps === 0) currentCard.iv = 1;
    else if(currentCard.reps === 1) currentCard.iv = 6;
    else currentCard.iv = Math.round(currentCard.iv * currentCard.ease);
    currentCard.reps++;
    currentCard.ease += (0.1 - (5 - qual) * (0.08 + (5 - qual) * 0.02));
  }
  if(q === "hard") currentCard.iv = Math.max(1, Math.round(currentCard.iv * 0.5));
  currentCard.due = Date.now() + (q === "again" ? 600000 : currentCard.iv * 86400000);
  save(); 
  nextCard();
}

/* EVENT LISTENERS */
document.getElementById("card").onclick = (e) => {
  if(!e.target.closest(".tts-btn") && !e.target.closest("#interactiveArea")) {
    document.getElementById("card").classList.toggle("flipped");
  }
};

document.getElementById("ttsFront").onclick = (e) => {
  e.stopPropagation();
  const u = new SpeechSynthesisUtterance(currentCard.word);
  u.lang = 'nl-NL';
  speechSynthesis.speak(u);
};

document.getElementById("ttsBack").onclick = (e) => {
  e.stopPropagation();
  const u = new SpeechSynthesisUtterance(currentCard.meaning);
  u.lang = 'tr-TR';
  speechSynthesis.speak(u);
};

document.getElementById("menuBtn").onclick = () => {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("show");
};

document.getElementById("overlay").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
};

document.querySelectorAll(".mode-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    appData.settings.mode = b.dataset.mode;
    save();
    if(currentCard) renderCardContent();
  };
});

document.querySelectorAll("[data-ans]").forEach(b => {
  b.onclick = () => handleAnswer(b.dataset.ans);
});

function addNewDeck() {
  const n = prompt("Deste ismi:");
  if(n) {
    const id = Date.now().toString();
    appData.decks.push({id, name: n});
    appData.currentDeckId = id;
    save();
    location.reload();
  }
}

function toggleTheme() {
  document.body.classList.toggle("light");
  appData.settings.theme = document.body.classList.contains("light") ? "light" : "dark";
  save();
}

// Başlat
load();
if(appData.settings.theme === "light") document.body.classList.add("light");
nextCard();
</script>
</body>
</html>
