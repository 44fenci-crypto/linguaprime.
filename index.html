<!DOCTYPE html>
<html lang="tr">
<head>

<title>LinguaPrime Ultimate | Kusursuz Sürüm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#0A0A0F;color:#F1F3F5;height:100dvh;overflow:hidden;transition:background 0.3s;}
body.light{background:#F3F4F6;color:#1F2937;}
.menu-btn{position:fixed;top:calc(12px + env(safe-area-inset-top));left:16px;z-index:1100;width:44px;height:44px;border-radius:14px;background:rgba(26,26,36,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
body.light .menu-btn{background:rgba(255,255,255,0.8);color:#1F2937;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#0F0F14;border-right:1px solid rgba(255,255,255,0.06);transform:translateX(-100%);transition:transform 0.25s ease;z-index:1300;display:flex;flex-direction:column;padding-top:calc(16px + env(safe-area-inset-top));}
body.light .sidebar{background:#FFFFFF;border-right:1px solid #E5E7EB;}
.sidebar.open{transform:translateX(0);}
.sidebar-header{padding:20px 16px;font-size:18px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;}
body.light .sidebar-header{border-bottom:1px solid #E5E7EB;}
.toggle-deck-btn{background:#2A2A36;border:none;color:white;padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;min-width:44px;min-height:34px;}
body.light .toggle-deck-btn{background:#E5E7EB;color:#1F2937;}
.deck-list-container{flex:1;overflow-y:auto;margin-bottom:8px;}
.sidebar-item{padding:12px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center;}
body.light .sidebar-item{border-bottom:1px solid #E5E7EB;color:#374151;}
.sidebar-item.active{background:#F97316;color:#0A0A0F;font-weight:600;}
.sidebar-item-actions{display:flex;gap:8px;}
.edit-deck-btn,.delete-deck-btn{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;padding:8px 12px;border-radius:8px;min-width:44px;min-height:44px;}
.edit-deck-btn:hover{background:rgba(255,255,255,0.2);}
.delete-deck-btn:hover{background:#EF4444;color:white;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1200;display:none;backdrop-filter:blur(4px);}
.overlay.show{display:block;}
.main{margin-left:0;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;}
.card-container{width:100%;max-width:560px;perspective:1200px;}

.card.swiping{transition:none;}
.card-face{backface-visibility:hidden;background:rgba(26,26,36,0.95);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:32px;padding:28px 20px;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
body.light .card-face{background:rgba(255,255,255,0.95);border:1px solid #E5E7EB;}
.card-front{transform:rotateY(0);}
.card-back{transform:rotateY(180deg);position:absolute;top:0;left:0;right:0;bottom:0;}
.word{font-size:32px;font-weight:700;margin:16px 0;}
.badge{background:rgba(255,255,255,0.06);padding:4px 12px;border-radius:24px;font-size:11px;}
body.light .badge{background:#F3F4F6;color:#4B5563;}
.action-bar{display:flex;gap:12px;padding:20px;max-width:560px;margin:0 auto;width:100%;}
.action-btn{flex:1;padding:12px;border-radius:32px;background:#1A1A24;border:none;color:white;font-weight:600;cursor:pointer;transition:0.1s;}
body.light .action-btn{background:#F3F4F6;color:#1F2937;border:1px solid #E5E7EB;}
.action-btn:active{transform:scale(0.96);}
.action-btn.again{border-left:4px solid #EF4444;}
.action-btn.hard{border-left:4px solid #F97316;}

body.light .modal{background:#FFFFFF;border:1px solid #E5E7EB;}
.modal.open{display:flex;}
.modal input,.modal select,.modal textarea{background:#0F0F14;border:1px solid #2A2A36;padding:10px;border-radius:16px;color:white;}

.modal-buttons{display:flex;gap:12px;justify-content:flex-end;}

.btn-secondary{background:#2A2A36;color:white;border:none;padding:8px 16px;border-radius:24px;cursor:pointer;}
body.light .btn-secondary{background:#F3F4F6;color:#1F2937;border:1px solid #E5E7EB;}

body.light th,body.light td{border-bottom:1px solid #E5E7EB;}

.kesfet-btn.bilmiyorum{background:#EF4444;color:white;}

canvas{background:#1A1A24;border-radius:16px;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;}
body.light canvas{background:#F9FAFB;}
.mode-selector{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}

body.light .mode-btn{background:#E5E7EB;color:#374151;}
.mode-btn.active{background:#F97316;color:white;}
.speed-selector{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}

<script>
const STORAGE_KEY = 'lp_ultimate_v7';
let notifTimers = [];
let appData = {
  version: 7, decks: [], currentDeckId: null, cards: [],
  settings: { mode: 'normal', tts: 'on', ttsSpeed: 1.0, direction: 'nltr', theme: 'dark', notifTimes: [], showOnlyActiveDeck: false }
};

function generateId() { return crypto.randomUUID(); }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

function migrateData(data) {
  if (!data.version) data.version = 7;
  if (!data.settings) data.settings = {};
  const defaults = { mode:'normal', tts:'on', ttsSpeed:1.0, direction:'nltr', theme:'dark', notifTimes:[], showOnlyActiveDeck:false };
  for (const key in defaults) { if (data.settings[key] === undefined) data.settings[key] = defaults[key]; }
  return data;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = migrateData({ ...appData, ...JSON.parse(raw) });
  } catch(e) { console.error(e); }
  if (!appData.decks.length) appData.decks = [{ id: generateId(), name: 'Genel' }];
  if (!appData.currentDeckId || !appData.decks.find(d => d.id === appData.currentDeckId))
    appData.currentDeckId = appData.decks[0].id;
  applyTheme();
}

// =============================================
// OVERLAY STACK YÖNETİMİ - TEK MERKEZİ NOKTA
// =============================================
let overlayStack = [];

function showOverlay(source) {
  if (!overlayStack.includes(source)) overlayStack.push(source);
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay(source) {
  overlayStack = overlayStack.filter(s => s !== source);
  if (overlayStack.length === 0) {
    document.getElementById('overlay').classList.remove('show');
  }
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  showOverlay('modal:' + id);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  hideOverlay('modal:' + id);
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar.classList.contains('open')) {
    closeSidebar();
  } else {
    sidebar.classList.add('open');
    showOverlay('sidebar');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  hideOverlay('sidebar');
}

// Overlay tıklaması - sadece en üstteki katmanı kapat
document.getElementById('overlay').onclick = () => {
  if (overlayStack.length === 0) return;
  const top = overlayStack[overlayStack.length - 1];
  if (top === 'sidebar') {
    closeSidebar();
  } else if (top.startsWith('modal:')) {
    closeModal(top.replace('modal:', ''));
  }
};
// =============================================

function getCards() { return appData.cards.filter(c => c.deckId === appData.currentDeckId); }
function getDueCards() {
  const now = Date.now();
  return getCards().filter(c => (c.due || 0) <= now).sort((a,b) => (a.due||0)-(b.due||0));
}

function parseCSVLine(str) {
  const result = []; let curr = '', inQuotes = false;
  for (let i = 0; i < str.length; i++) {
    if (str[i] === '"') inQuotes = !inQuotes;
    else if (str[i] === ',' && !inQuotes) { result.push(curr); curr = ''; }
    else curr += str[i];
  }
  result.push(curr);
  return result.map(s => s.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
}

function updateSM2(card, quality) {
  const qMap = { again:1, hard:2, good:4, easy:5 };
  let q = qMap[quality], reps = card.repetitions||0, iv = card.interval||0, ease = card.ease||2.5;
  if (q < 3) { reps = 0; iv = 1; }
  else {
    reps++;
    if (reps === 1) iv = 1; else if (reps === 2) iv = 6; else iv = Math.round(iv * ease);
    ease += 0.1 - (5-q)*(0.08+(5-q)*0.02);
    if (ease < 1.3) ease = 1.3;
  }
  if (quality === 'easy') iv = Math.round(iv * 1.3);
  if (quality === 'hard') iv = Math.max(1, Math.round(iv * 0.8));
  card.due = Date.now() + ((quality === 'again') ? 600000 : iv * 86400000);
  card.repetitions = reps; card.interval = iv; card.ease = ease;
  save();
}

function answer(quality) {
  if (!currentCard) return;
  if (quality === 'again') currentCard.wrong = (currentCard.wrong||0)+1;
  else currentCard.correct = (currentCard.correct||0)+1;
  updateSM2(currentCard, quality);
  nextCard();
}

  u.rate = appData.settings.ttsSpeed;

}

function getBackText() { if (!currentCard) return ''; return appData.settings.direction==='nltr'?currentCard.meaning:currentCard.word; }

function getVerbQuestion(card) {
  const tenses = [];
  if (card.verbPresent) tenses.push({ name:'şimdiki zaman', field:'verbPresent', isPresent:true });
  if (card.verbPastSingular) tenses.push({ name:'geçmiş zaman tekil', field:'verbPastSingular' });
  if (card.verbPastPlural) tenses.push({ name:'geçmiş zaman çoğul', field:'verbPastPlural' });
  if (card.verbPerfect) tenses.push({ name:'perfectum', field:'verbPerfect', isPerfect:true });
  if (!tenses.length) return { question: card.word, answer: card.meaning };
  const chosen = tenses[Math.floor(Math.random()*tenses.length)];
  const persons = ['ik','jij','hij','wij','jullie','zij'];
  let answerText = '', personPart = '';
  if (chosen.isPresent) {
    const forms = card.verbPresent.split(',');
    answerText = (forms[currentVerbPersonIdx]||'').trim();
    personPart = ` (${persons[currentVerbPersonIdx]})`;
  } else if (chosen.isPerfect) {
    answerText = `${card.verbAuxiliary||'hebben'} ${card.verbPerfect}`;
  } else {
    answerText = card[chosen.field]||'';
  }
  return { question:`${card.word} - ${chosen.name}${personPart}`, answer:answerText };
}

function renderCurrentCard() {
  if (!currentCard) return;
  const frontText = getFrontText(), backText = getBackText();
  document.getElementById('frontWord').innerHTML = escapeHtml(frontText);
  document.getElementById('backWord').innerHTML = escapeHtml(backText);
  document.getElementById('frontCat').innerText = currentCard.category||'';
  document.getElementById('backCat').innerText = currentCard.category||'';
  document.getElementById('frontSentence').innerHTML = escapeHtml(currentCard.sentence||'');
  document.getElementById('backSentence').innerHTML = escapeHtml(currentCard.sentence||'');
  const antArea = document.getElementById('antonymArea');
  antArea.innerHTML = currentCard.antonym ? `↔ Zıt: ${escapeHtml(currentCard.antonym)}` : '';
  antArea.className = 'antonym-hidden';
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('testArea').innerHTML = '';
  document.getElementById('dragArea').innerHTML = '';

  if (currentCard.cardType === 'verb') {
    const vq = getVerbQuestion(currentCard);
    document.getElementById('frontWord').innerHTML = escapeHtml(vq.question);
    document.getElementById('backWord').innerHTML = escapeHtml(vq.answer);
  }
  if (currentCard.cardType === 'separable' && currentCard.sepExample) {
    document.getElementById('frontWord').innerHTML = escapeHtml(currentCard.sepExample);
    document.getElementById('backWord').innerHTML = escapeHtml(`${currentCard.sepPrefix} ${currentCard.sepBase}`);
  }
  if (currentCard.cardType === 'modal' && currentCard.modalConjugation) {
    const forms = currentCard.modalConjugation.split(',');
    const persons = ['ik','jij','hij','wij','jullie','zij'];
    document.getElementById('frontWord').innerHTML = `${escapeHtml(currentCard.word)} - ${persons[currentVerbPersonIdx]} (şimdiki)`;
    document.getElementById('backWord').innerHTML = escapeHtml((forms[currentVerbPersonIdx]||'').trim());
  }
  if (currentCard.cardType === 'pattern') {
    document.getElementById('frontWord').innerHTML = escapeHtml(currentCard.word);
    document.getElementById('backWord').innerHTML = escapeHtml(currentCard.meaning);
  }

  setTimeout(() => { if (antArea.innerHTML) antArea.className = 'antonym-visible'; }, 800);

  const bw = document.getElementById('backWord').textContent;
  if (appData.settings.mode === 'test') renderTestMode(bw);

function renderDragMode() {
  const sentence = currentCard ? currentCard.sentence : '';

  const words = sentence.split(' ');

  dragArea.innerHTML = '';

  checkBtn.onclick = ()=>{ const uo=Array.from(dz.children).map(el=>el.textContent).join(' '); if(uo===sentence) answer('good'); else answer('again'); };

  function makeWord(w, fromDrop) {
    const span = document.createElement('span'); span.className='drag-word'; span.textContent=w;
    if (fromDrop) {
      span.style.background='#22C55E';
      span.onclick=()=>{ const rs=makeWord(w,false); dc.appendChild(rs); span.remove(); };
    } else {
      span.onclick=()=>{ const ds=makeWord(w,true); dz.appendChild(ds); span.remove(); };
    }
    return span;
  }
  shuffled.forEach(w=>dc.appendChild(makeWord(w,false)));
  dragArea.appendChild(dc); dragArea.appendChild(dz); dragArea.appendChild(checkBtn);
}

function flipCard() { document.getElementById('card').classList.toggle('flipped'); }

function initSwipe(cardId, rightIconId, leftIconId, onSwipeRight, onSwipeLeft) {
  const card = document.getElementById(cardId); if (!card) return;
  let sx=0, sy=0, sw=false;
  card.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; sw=true; card.style.transition='none'; }, {passive:true});
  card.addEventListener('touchmove', e=>{
    if (!sw) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if (Math.abs(dx)<10) return;
    if (Math.abs(dy)>Math.abs(dx)) return;
    e.preventDefault();
    const base=card.classList.contains('flipped')?180:0;
    card.style.transform=`rotateY(${base}deg) rotateZ(${dx*0.02}deg)`;
    const ri=document.getElementById(rightIconId), li=document.getElementById(leftIconId);
    if(ri) ri.style.opacity=dx>0?Math.min(Math.abs(dx)/80,0.8):0;
    if(li) li.style.opacity=dx<0?Math.min(Math.abs(dx)/80,0.8):0;
  }, {passive:false});
  card.addEventListener('touchend', e=>{
    if (!sw) return;
    const dx=e.changedTouches[0].clientX-sx;
    card.style.transition=''; card.style.transform='';
    const ri=document.getElementById(rightIconId), li=document.getElementById(leftIconId);
    if(ri) ri.style.opacity=0; if(li) li.style.opacity=0;
    sw=false;
    if (Math.abs(dx)>80) { if(dx>0) onSwipeRight(); else onSwipeLeft(); }
  });
}

function openStats() {
  const cards=getCards(), total=cards.length;
  const correct=cards.reduce((a,c)=>a+(c.correct||0),0), wrong=cards.reduce((a,c)=>a+(c.wrong||0),0);
  const ta=correct+wrong, rate=ta>0?Math.round(correct/ta*100):0;
  const learned=cards.filter(c=>(c.repetitions||0)>=2).length, dueNow=getDueCards().length;
  document.getElementById('statsContent').innerHTML=`<div style="display:grid;gap:8px;">
    <div>📊 Toplam Kart: <strong>${total}</strong></div>
    <div>✅ Toplam Doğru: <strong>${correct}</strong></div>
    <div>❌ Toplam Yanlış: <strong>${wrong}</strong></div>
    <div>🏆 Başarı Oranı: <strong>${rate}%</strong></div>
    <div>📚 Öğrenilen (≥2 tekrar): <strong>${learned}</strong></div>
    <div>⏰ Şu An Bekleyen: <strong>${dueNow}</strong></div></div>`;
  const canvas=document.getElementById('treeCanvas'), ctx=canvas.getContext('2d');
  canvas.width=300; canvas.height=200; ctx.clearRect(0,0,300,200);
  ctx.fillStyle=appData.settings.theme==='dark'?'#1A1A24':'#F9FAFB'; ctx.fillRect(0,0,300,200);
  ctx.fillStyle='#8B4513'; ctx.fillRect(138,130,24,60);
  const level=Math.min(10,Math.floor(learned/Math.max(1,total)*10));
  const shades=['#1a5e20','#2e7d32','#388e3c','#43a047','#4caf50','#66bb6a','#81c784','#a5d6a7','#c8e6c9','#e8f5e9'];
  for(let i=0;i<level;i++){
    ctx.fillStyle=shades[i]; const sz=60-i*4, y=130-i*14;
    ctx.beginPath(); ctx.moveTo(150,y-sz/2); ctx.lineTo(150+sz/2,y+sz/2); ctx.lineTo(150-sz/2,y+sz/2); ctx.closePath(); ctx.fill();
  }
  if(level===0){ ctx.fillStyle='#9CA3AF'; ctx.font='12px system-ui'; ctx.textAlign='center'; ctx.fillText('Henüz kart öğrenilmedi',150,100); }
  openModal('statsModal');
}

function scheduleNotif() {
  notifTimers.forEach(t=>clearTimeout(t)); notifTimers=[];
  const times=appData.settings.notifTimes.filter(Boolean); if(!times.length) return;
  const now=new Date();
  times.forEach(t=>{
    const [h,m]=t.split(':'); const target=new Date(); target.setHours(+h,+m,0,0);
    if(target<=now) target.setDate(target.getDate()+1);
    notifTimers.push(setTimeout(()=>{ if(Notification.permission==='granted') new Notification('LinguaPrime',{body:`${getDueCards().length} kart seni bekliyor!`}); scheduleNotif(); }, target.getTime()-now.getTime()));
  });
}

if(Notification.permission!=='granted'&&Notification.permission!=='denied') Notification.requestPermission();

function applyTheme() {
  const t=appData.settings.theme;
  if(t==='dark') document.body.classList.remove('light');
  else if(t==='light') document.body.classList.add('light');
  else { if(window.matchMedia('(prefers-color-scheme:dark)').matches) document.body.classList.remove('light'); else document.body.classList.add('light'); }
}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{ if(appData.settings.theme==='auto') applyTheme(); });

function setActiveModeButton() {
  document.querySelectorAll('.mode-btn').forEach(btn=>{ btn.classList.toggle('active', btn.dataset.mode===appData.settings.mode); });
}

// ── Event Listeners ──
document.getElementById('card').onclick=e=>{ if(e.target.closest('#testArea,#dragArea,.action-btn,.mode-btn,.kesfet-btn,.drag-word,.tts-btn')) return; flipCard(); };
document.getElementById('frontTtsBtn').onclick=playFrontTTS;
document.getElementById('backTtsBtn').onclick=playBackTTS;
document.getElementById('kesfetFrontTtsBtn').onclick=playKesfetFrontTTS;
document.getElementById('kesfetBackTtsBtn').onclick=playKesfetBackTTS;

document.getElementById('menuBtn').onclick=toggleSidebar;

['again','hard','good','easy'].forEach(q=>{ document.getElementById(q+'Btn').onclick=()=>answer(q); });

document.getElementById('toggleDeckViewBtn').onclick=()=>{ appData.settings.showOnlyActiveDeck=!appData.settings.showOnlyActiveDeck; save(); renderSidebar(); };

document.getElementById('addDeckBtn').onclick=()=>{ document.getElementById('deckName').value=''; openModal('deckModal'); };
document.getElementById('cancelDeckBtn').onclick=()=>closeModal('deckModal');
document.getElementById('saveDeckBtn').onclick=()=>{ const n=document.getElementById('deckName').value.trim(); if(!n) return alert('Deste adı boş olamaz!'); addDeck(n); closeModal('deckModal'); };

document.getElementById('cancelEditDeckBtn').onclick=()=>closeModal('editDeckModal');
document.getElementById('saveEditDeckBtn').onclick=()=>{
  const n=document.getElementById('editDeckName').value.trim();
  if(n&&window.editDeckId){ const d=appData.decks.find(d=>d.id===window.editDeckId); if(d) d.name=n; save(); renderSidebar(); }
  closeModal('editDeckModal');
};

document.getElementById('manageCardsBtn').onclick=()=>{ openManager(); closeSidebar(); };
document.getElementById('closeManagerBtn').onclick=()=>closeModal('managerModal');

document.getElementById('addCardFromManagerBtn').onclick=()=>{
  window.editCardId=null;
  document.getElementById('cardModalTitle').innerText='Kart Ekle';
  ['cardWord','cardMeaning','cardSentence','cardAntonym','verbPresent','verbPastSingular','verbPastPlural','verbPerfect','sepPrefix','sepBase','sepExample','modalConjugation','patternSlot'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cardTypeSelect').value='vocab';
  document.getElementById('cardCategory').value='Genel';
  document.getElementById('cardDifficulty').value='';
  document.getElementById('verbAuxiliary').value='hebben';
  updateCardTypeFields('vocab');
  openModal('cardModal');
};

document.getElementById('cancelCardBtn').onclick=()=>closeModal('cardModal');
document.getElementById('saveCardBtn').onclick=()=>{
  const w=document.getElementById('cardWord').value.trim(), m=document.getElementById('cardMeaning').value.trim();
  if(!w||!m) return alert('Kelime ve Anlam zorunludur!');
  const ct=document.getElementById('cardTypeSelect').value;
  const data={word:w,meaning:m,sentence:document.getElementById('cardSentence').value.trim(),antonym:document.getElementById('cardAntonym').value.trim(),category:document.getElementById('cardCategory').value,difficulty:document.getElementById('cardDifficulty').value,cardType:ct};
  if(ct==='verb'){data.verbPresent=document.getElementById('verbPresent').value.trim();data.verbPastSingular=document.getElementById('verbPastSingular').value.trim();data.verbPastPlural=document.getElementById('verbPastPlural').value.trim();data.verbPerfect=document.getElementById('verbPerfect').value.trim();data.verbAuxiliary=document.getElementById('verbAuxiliary').value;}
  if(ct==='separable'){data.sepPrefix=document.getElementById('sepPrefix').value.trim();data.sepBase=document.getElementById('sepBase').value.trim();data.sepExample=document.getElementById('sepExample').value.trim();}
  if(ct==='modal') data.modalConjugation=document.getElementById('modalConjugation').value.trim();
  if(ct==='pattern') data.patternSlot=document.getElementById('patternSlot').value.trim();
  if(window.editCardId) updateCard(window.editCardId,data); else addCard(data);
  closeModal('cardModal');
  if(document.getElementById('managerModal').classList.contains('open')) renderManagerTable();
};

document.getElementById('csvFileInput').onchange=e=>{ if(e.target.files[0]) handleCSVFile(e.target.files[0]); e.target.value=''; };
document.getElementById('importCsvBtn').onclick=()=>document.getElementById('csvFileInput').click();
document.getElementById('exportCsvBtn').onclick=exportCSV;
document.getElementById('jsonFileInput').onchange=e=>{ if(e.target.files[0]) handleJsonFile(e.target.files[0]); e.target.value=''; };
document.getElementById('importJsonBackupBtn').onclick=()=>document.getElementById('jsonFileInput').click();
document.getElementById('exportJsonBackupBtn').onclick=exportJsonBackup;

document.getElementById('kesfetBtn').onclick=()=>{ openKesfet(); closeSidebar(); };
document.getElementById('kesfetYesBtn').onclick=()=>kesfetAnswer(true);
document.getElementById('kesfetNoBtn').onclick=()=>kesfetAnswer(false);
document.getElementById('kesfetCloseBtn').onclick=closeKesfet;

document.getElementById('statsBtn').onclick=()=>{ openStats(); closeSidebar(); };
document.getElementById('closeStatsBtn').onclick=()=>closeModal('statsModal');

document.getElementById('settingsBtn').onclick=()=>{
  document.getElementById('ttsToggle').value=appData.settings.tts;
  document.getElementById('directionSelect').value=appData.settings.direction;
  document.getElementById('themeSelect').value=appData.settings.theme;
  if(appData.settings.notifTimes[0]) document.getElementById('notifTime1').value=appData.settings.notifTimes[0];
  if(appData.settings.notifTimes[1]) document.getElementById('notifTime2').value=appData.settings.notifTimes[1];
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',Number(b.dataset.speed)===appData.settings.ttsSpeed));
  // Sidebar'ı kapat SONRA modal'ı aç - overlay stack doğru çalışsın
  closeSidebar();
  openModal('settingsModal');
};
document.getElementById('closeSettingsBtn').onclick=()=>closeModal('settingsModal');

document.getElementById('saveNotifBtn').onclick=()=>{
  appData.settings.notifTimes=[document.getElementById('notifTime1').value,document.getElementById('notifTime2').value].filter(Boolean);
  save(); scheduleNotif(); alert('Bildirim ayarlandı!');
};

document.getElementById('ttsToggle').onchange=e=>{ appData.settings.tts=e.target.value; save(); };
document.getElementById('directionSelect').onchange=e=>{ appData.settings.direction=e.target.value; save(); renderCurrentCard(); };
document.getElementById('themeSelect').onchange=e=>{ appData.settings.theme=e.target.value; save(); applyTheme(); };

document.querySelectorAll('.speed-btn').forEach(btn=>{ btn.onclick=()=>{ appData.settings.ttsSpeed=Number(btn.dataset.speed); save(); document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }; });
document.querySelectorAll('.mode-btn').forEach(btn=>{ btn.onclick=()=>{ appData.settings.mode=btn.dataset.mode; save(); renderCurrentCard(); setActiveModeButton(); }; });

// Başlatma
load();
renderSidebar();
initSwipe('card','swipeRight','swipeLeft',()=>answer('good'),()=>answer('again'));
initSwipe('kesfetCard','kesfetSwipeRight','kesfetSwipeLeft',()=>kesfetAnswer(true),()=>kesfetAnswer(false));
scheduleNotif();
setActiveModeButton();
nextCard();
</script>
