<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LinguaPrime v9 - Tam Çalışan Versiyon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e8e8ed;color:#1c1c1e;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px}
.streak-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(0,0,0,.07);background:#fff;flex-shrink:0}
.streak-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid transparent}
.streak-pill.active{background:rgba(249,115,22,.1);color:#f97316;border-color:rgba(249,115,22,.2)}
.streak-pill.inactive{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb}
.goal-wrap{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.goal-label{font-size:11px;color:#6b7280;display:flex;justify-content:space-between}
.goal-bar{height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden}
.goal-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#a855f7);transition:width .4s}
.goal-fill.done{background:linear-gradient(90deg,#22c55e,#16a34a)}
.best-badge{font-size:10px;color:#9ca3af;background:#f9fafb;padding:4px 8px;border-radius:8px;white-space:nowrap}
.set-goal-btn{font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:6px}
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar-wrap{position:fixed;top:0;left:0;height:100%;z-index:100;transform:translateX(-100%);transition:transform .3s ease}
.sidebar-wrap.open{transform:translateX(0)}
.sidebar-backdrop{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5);display:none}
.sidebar-backdrop.open{display:block}
.sidebar{width:280px;height:100%;background:#171717;color:#f5f5f5;display:flex;flex-direction:column;border-right:1px solid #2a2a2a;overflow:hidden}
.sb-header{padding:12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
.sb-close{width:30px;height:30px;border-radius:8px;border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer}
.sb-body{flex:1;overflow-y:auto;padding:6px 10px 16px}
.acc-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:8px;border:none;background:none;color:inherit;cursor:pointer}
.acc-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:rgba(255,255,255,.3)}
.acc-arrow{font-size:10px;color:rgba(255,255,255,.2);transition:transform .2s}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{display:none;padding:4px 0 6px 4px;flex-direction:column;gap:5px}
.acc-body.open{display:flex}
.sb-divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:4px 0}
.deck-list{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}
.deck-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:10px;border:none;cursor:pointer;background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);font-size:12px;width:100%}
.deck-item:hover{background:rgba(255,255,255,.1)}
.deck-item.active{background:#4f46e5;color:#fff}
.deck-item-count{font-size:10px;opacity:.45}
.deck-row{display:flex;gap:6px}
.deck-row button{flex:1;padding:6px;border-radius:8px;border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);font-size:11px;font-weight:600;cursor:pointer}
.sb-select{width:100%;padding:8px 10px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:#f5f5f5;font-size:12px;cursor:pointer}
.filter-section{display:flex;flex-direction:column;gap:4px}
.cat-list{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:9px;border:none;cursor:pointer;background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);font-size:11px;width:100%}
.cat-item.active{background:#4f46e5;color:#fff}
.diff-pills{display:flex;flex-wrap:wrap;gap:5px}
.diff-pill{padding:4px 10px;border-radius:8px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.diff-pill.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff}
.clear-filter{font-size:10px;color:#f87171;background:none;border:none;cursor:pointer}
.sb-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);font-size:12px;font-weight:500;cursor:pointer}
.sb-btn.primary{background:#4f46e5;color:#fff}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.top-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;background:rgba(255,255,255,.3);backdrop-filter:blur(4px)}
.menu-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(0,0,0,.07);color:#333;cursor:pointer;font-size:18px}
.top-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.top-right{display:flex;align-items:center;gap:5px}
.info-label{font-size:11px;font-weight:600;color:#9ca3af}
.pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:#fff;color:#444}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px;overflow-y:auto}
.card-wrapper{width:100%;max-width:520px;perspective:1000px}
.card{width:100%;position:relative;transform-style:preserve-3d;transition:transform .5s ease;cursor:pointer;border-radius:24px}
.card.flipped{transform:rotateY(180deg)}
.card-face{width:100%;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.1);background:#fff;border:1px solid rgba(0,0,0,.05);padding:clamp(20px,5vw,40px);min-height:clamp(200px,38vw,300px)}
.card-back-face{position:absolute;top:0;left:0;right:0;transform:rotateY(180deg)}
.card-top-row{position:absolute;top:10px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between}
.cat-badge{font-size:10px;padding:3px 8px;border-radius:99px;background:#f8f9fa;color:#888}
.diff-badge{font-size:10px;padding:3px 8px;border-radius:99px;border:1px solid;font-weight:700}
.card-word{font-weight:700;font-size:clamp(20px,5vw,32px);margin:16px 0 8px 0}
.spk-btn{width:34px;height:34px;border-radius:50%;border:none;background:#f0f0f3;cursor:pointer;font-size:15px}
.card-sentence{margin-top:10px;padding:8px 12px;border-radius:12px;background:#f8f9fa;font-size:12px;font-style:italic;color:#666;width:100%}
.diff-row{display:flex;gap:6px;width:100%;margin-top:12px}
.diff-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:16px;border:1px solid;font-size:12px;font-weight:700;cursor:pointer}
.diff-again{background:#fef2f2;border-color:#fecaca;color:#dc2626}
.diff-hard{background:#fff7ed;border-color:#fed7aa;color:#ea580c}
.diff-good{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.diff-easy{background:#eef2ff;border-color:#c7d2fe;color:#4f46e5}
.flip-row{display:flex;gap:8px;width:100%;margin-top:12px}
.flip-btn{flex:1;padding:12px;border-radius:18px;border:1px solid rgba(0,0,0,.08);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
.mode-badge{font-size:10px;padding:5px 12px;border-radius:20px;background:rgba(0,0,0,.04);color:#999}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px;max-height:92vh;overflow:hidden;width:100%;max-width:600px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid #f0f0f3}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f3;cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:16px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid #f0f0f3;display:flex;gap:8px}
.modal-footer button{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.btn-cancel{background:#f0f0f3;color:#555}
.btn-primary{background:#4f46e5;color:#fff}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;text-transform:uppercase;color:#999;font-weight:700}
.field input,.field select{padding:9px 12px;border-radius:11px;border:1px solid #e2e2e8;font-size:13px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.confetti-overlay{position:fixed;inset:0;z-index:999;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:70px;display:none}
.confetti-overlay.show{display:flex}
@media(min-width:768px){.sidebar-wrap{position:relative;transform:none!important}.sidebar-backdrop{display:none!important}}
</style>
</head>
<body>
<div class="confetti-overlay" id="confetti">🎉</div>
<div class="streak-bar">
  <div class="streak-pill inactive" id="streakPill">💤 0</div>
  <div class="goal-wrap">
    <div class="goal-label"><span id="goalLabel">0 / 20 kart</span><button class="set-goal-btn" onclick="setGoal()">✏️</button></div>
    <div class="goal-bar"><div class="goal-fill" id="goalFill" style="width:0%"></div></div>
  </div>
  <div class="best-badge">🏆 <span id="longestStreak">0</span></div>
</div>
<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
  <div class="sidebar-wrap" id="sidebarWrap">
    <div class="sidebar">
      <div class="sb-header"><span class="sb-logo">LinguaPrime v9</span><button class="sb-close" onclick="closeSidebar()">✕</button></div>
      <div class="sb-body">
        <button class="acc-btn" onclick="toggleAcc('decks')"><span class="acc-label">Desteler</span><span class="acc-arrow open">▾</span></button>
        <div class="acc-body open" id="acc-body-decks"><div class="deck-list" id="deckList"></div><div class="deck-row"><button onclick="createDeck()">➕ Yeni</button><button onclick="deleteDeck()">🗑 Sil</button></div></div>
        <hr class="sb-divider">
        <button class="acc-btn" onclick="toggleAcc('settings')"><span class="acc-label">Çalışma Ayarları</span><span class="acc-arrow open">▾</span></button>
        <div class="acc-body open" id="acc-body-settings"><select class="sb-select" id="directionSelect" onchange="changeDirection()"><option value="nltr">🇳🇱 NL → TR 🇹🇷</option><option value="trnl">🇹🇷 TR → NL 🇳🇱</option></select><select class="sb-select" id="modeSelect" onchange="changeMode()"><option value="normal">🃏 Normal</option><option value="test">✍️ Yazmalı Test</option><option value="hint">💡 Harf Doldurma</option><option value="mcq">🔘 Çoktan Seçmeli</option></select></div>
        <hr class="sb-divider">
        <button class="acc-btn" onclick="toggleAcc('cards')"><span class="acc-label">Kartlar</span><span class="acc-arrow open">▾</span></button>
        <div class="acc-body open" id="acc-body-cards"><button class="sb-btn primary" onclick="openAddCard()">✍️ Kart Ekle</button><input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSV(event)"><button class="sb-btn" onclick="document.getElementById('csvInput').click()">📂 CSV Yükle</button></div>
        <hr class="sb-divider">
        <button class="acc-btn" onclick="toggleAcc('tools')"><span class="acc-label">Araçlar</span><span class="acc-arrow open">▾</span></button>
        <div class="acc-body open" id="acc-body-tools"><button class="sb-btn" onclick="openAnalysis()">📊 Analiz</button><button class="sb-btn" onclick="openManager()">📋 Kart Yönetimi</button><button class="sb-btn" onclick="toggleTheme()">🌙 Koyu Tema</button></div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="top-bar"><button class="menu-btn" onclick="openSidebar()">☰</button><div class="top-left"><span class="info-label" id="infoLabel"></span></div><div class="top-right"><div class="pill">✅<span id="statC">0</span></div><div class="pill">❌<span id="statW">0</span></div><div class="pill">⏳<span id="statDue">0</span></div></div></div>
    <div class="card-area"><div class="card-wrapper"><div class="card" id="card" onclick="handleCardClick()"><div class="card-face" id="cardFront"></div><div class="card-face card-back-face" id="cardBack"></div></div></div><div class="action-area" id="actionArea"></div><div class="mode-badge" id="modeBadge"></div></div>
  </div>
</div>
<div class="overlay" id="addOverlay" onclick="closeAddCard()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">✍️ Kart Ekle</div></div><button class="modal-close" onclick="closeAddCard()">✕</button></div><div class="modal-body"><div class="field"><label>Kelime (NL)</label><input id="addWord" placeholder="Bijv. lopen, fietsen..."></div><div class="field"><label>Anlam (TR)</label><input id="addMeaning" placeholder="Örn. yürümek, bisiklet sürmek..."></div><div class="field"><label>Örnek Cümle</label><input id="addSentence" placeholder="Bijv. Ik loop naar huis."></div><div class="field-row"><div class="field"><label>Kategori</label><select id="addCategory"><option>Genel</option><option>Fiiller</option><option>Hayvanlar</option><option>Ev</option><option>Yiyecekler</option><option>Meslekler</option></select></div><div class="field"><label>Zorluk</label><select id="addDiff"><option value="">—</option><option value="kolay">🟢 Kolay</option><option value="orta">🟡 Orta</option><option value="zor">🔴 Zor</option></select></div></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeAddCard()">İptal</button><button class="btn-primary" id="addBtn" onclick="doAddCard()">Kart Ekle</button></div></div></div>
<div class="overlay" id="analysisOverlay" onclick="closeAnalysis()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">📊 Analiz</div></div><button class="modal-close" onclick="closeAnalysis()">✕</button></div><div class="modal-body"><div id="analysisContent" style="text-align:center;padding:20px">Yükleniyor...</div></div></div></div>
<div class="overlay" id="managerOverlay" onclick="closeManager()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">📋 Kart Yönetimi</div></div><button class="modal-close" onclick="closeManager()">✕</button></div><div class="modal-body"><div id="managerContent" style="text-align:center;padding:20px">Yükleniyor...</div></div></div></div>
<script>
// LINGUAPRIME V9 - TAM ÇALIŞAN VERSİYON
let app = {
  decks: [{ name: 'Genel', cards: [] }],
  currentDeck: 0,
  direction: 'nltr',
  mode: 'normal',
  streak: { current: 0, longest: 0, lastStudy: '', todayDone: 0, dailyGoal: 20, totalCards: 0, totalCorrect: 0 }
};

function save() { localStorage.setItem('lp_app', JSON.stringify(app)); }
function deck() { return app.decks[app.currentDeck]; }
function today() { return new Date().toISOString().slice(0,10); }

// Örnek kartlar (başlangıç için)
function initSampleCards() {
  if(deck().cards.length === 0) {
    deck().cards.push({ word: 'lopen', meaning: 'yürümek', sentence: 'Ik loop naar huis.', category: 'Fiiller', diffLabel: 'kolay', correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5, due: Date.now() - 86400000, history: [] });
    deck().cards.push({ word: 'fietsen', meaning: 'bisiklet sürmek', sentence: 'Wij fietsen naar school.', category: 'Fiiller', diffLabel: 'kolay', correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5, due: Date.now() - 86400000, history: [] });
    deck().cards.push({ word: 'de hond', meaning: 'köpek', sentence: 'De hond blaft.', category: 'Hayvanlar', diffLabel: 'kolay', correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5, due: Date.now() - 86400000, history: [] });
    deck().cards.push({ word: 'het huis', meaning: 'ev', sentence: 'Het huis is groot.', category: 'Ev', diffLabel: 'orta', correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5, due: Date.now() - 86400000, history: [] });
    deck().cards.push({ word: 'eten', meaning: 'yemek yemek', sentence: 'Ik eet een appel.', category: 'Fiiller', diffLabel: 'kolay', correct: 0, wrong: 0, repetitions: 0, interval: 0, ease: 2.5, due: Date.now() - 86400000, history: [] });
    save();
  }
}

// Load data
function loadData() {
  try {
    const saved = localStorage.getItem('lp_app');
    if(saved) {
      const parsed = JSON.parse(saved);
      app.decks = parsed.decks || [{ name: 'Genel', cards: [] }];
      app.currentDeck = parsed.currentDeck || 0;
      app.direction = parsed.direction || 'nltr';
      app.mode = parsed.mode || 'normal';
      app.streak = parsed.streak || { current: 0, longest: 0, lastStudy: '', todayDone: 0, dailyGoal: 20, totalCards: 0, totalCorrect: 0 };
    }
  } catch(e) { console.log(e); }
  initSampleCards();
  updateDeckList();
  pickCard();
  updateStats();
  updateStreakBar();
}

let currentCardIndex = null;
let flipped = false;
let sesCorrect = 0, sesWrong = 0;
let sesStart = Date.now();

function getQ(card) { return app.direction === 'nltr' ? card.word : card.meaning; }
function getA(card) { return app.direction === 'nltr' ? card.meaning : card.word; }

function pickCard() {
  const cards = deck().cards;
  if(cards.length === 0) { currentCardIndex = null; renderCard(); return; }
  const now = Date.now();
  const dueCards = cards.filter(c => (c.due || 0) <= now);
  if(dueCards.length > 0) { currentCardIndex = cards.findIndex(c => c === dueCards[0]); }
  else { currentCardIndex = 0; }
  renderCard();
}

function renderCard() {
  flipped = false;
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('flipped');
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');
  const actionArea = document.getElementById('actionArea');
  const modeBadge = document.getElementById('modeBadge');
  
  const modeNames = { normal: '🃏 Normal', test: '✍️ Test', hint: '💡 Harf', mcq: '🔘 Çoktan' };
  modeBadge.textContent = modeNames[app.mode] + ' · ' + (app.direction === 'nltr' ? 'NL → TR' : 'TR → NL');
  
  if(currentCardIndex === null || currentCardIndex >= deck().cards.length) {
    front.innerHTML = '<div style="font-size:24px">🎉 Bugün tekrar yok!</div><div style="margin-top:8px;font-size:12px">Tüm kartlar tamamlandı</div>';
    back.innerHTML = '';
    actionArea.innerHTML = '';
    return;
  }
  
  const card = deck().cards[currentCardIndex];
  const question = getQ(card);
  const answer = getA(card);
  const diffBadge = card.diffLabel ? `<span class="diff-badge" style="background:${card.diffLabel==='zor'?'#fef2f2':card.diffLabel==='orta'?'#fff7ed':'#f0fdf4'};border-color:${card.diffLabel==='zor'?'#fecaca':card.diffLabel==='orta'?'#fed7aa':'#bbf7d0'};color:${card.diffLabel==='zor'?'#dc2626':card.diffLabel==='orta'?'#ea580c':'#16a34a'}">${card.diffLabel==='zor'?'🔴':card.diffLabel==='orta'?'🟡':'🟢'} ${card.diffLabel || ''}</span>` : '';
  
  front.innerHTML = `<div class="card-top-row"><span class="cat-badge">${card.category || 'Genel'}</span>${diffBadge}</div><div class="card-word">${question}</div>${app.mode !== 'normal' ? '<div class="card-flip-hint" style="margin-top:12px;font-size:11px;color:#999">cevabı yaz</div>' : '<div class="card-flip-hint" style="margin-top:12px;font-size:11px;color:#999">tıkla &amp; çevir</div>'}`;
  
  back.innerHTML = `<div class="card-top-row"><span class="cat-badge">${card.category || 'Genel'}</span>${diffBadge}</div><div class="card-word">${answer}</div>${card.sentence ? `<div class="card-sentence">💬 ${card.sentence}</div>` : ''}<div class="card-flip-hint" style="margin-top:12px;font-size:11px;color:#999">nasıl gitti?</div>`;
  
  if(app.mode === 'normal') {
    actionArea.innerHTML = flipped ? `<div class="diff-row"><button class="diff-btn diff-again" onclick="answer('again')"><span>Tekrar</span><span class="sub">&lt;1g</span></button><button class="diff-btn diff-hard" onclick="answer('hard')"><span>Zor</span><span class="sub">1g</span></button><button class="diff-btn diff-good" onclick="answer('good')"><span>Biliyorum</span><span class="sub">3g</span></button><button class="diff-btn diff-easy" onclick="answer('easy')"><span>Kolay</span><span class="sub">7g+</span></button></div>` : `<div class="flip-row"><button class="flip-btn" onclick="flipCard()">🔄 Kartı Çevir</button><button class="flip-btn" onclick="pickCard()">› Sonraki</button></div>`;
  } else {
    actionArea.innerHTML = `<div class="flip-row"><button class="flip-btn" onclick="checkAnswer()">✓ Kontrol Et</button><button class="flip-btn" onclick="pickCard()">› Sonraki</button></div><input type="text" id="testInput" placeholder="Cevabı yaz..." style="width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin-top:8px;font-size:14px;text-align:center">`;
    setTimeout(() => { const inp = document.getElementById('testInput'); if(inp) inp.focus(); }, 100);
    window.currentAnswer = answer;
  }
}

function flipCard() { flipped = true; document.getElementById('card').classList.add('flipped'); renderCard(); }
function handleCardClick() { if(app.mode === 'normal' && !flipped) flipCard(); }

function checkAnswer() {
  const inp = document.getElementById('testInput');
  if(!inp) return;
  const userAnswer = inp.value.trim().toLowerCase();
  const correct = window.currentAnswer.toLowerCase();
  if(userAnswer === correct) {
    answer('good');
  } else {
    answer('again');
    alert('❌ Yanlış! Doğru cevap: ' + window.currentAnswer);
  }
}

function updateSM2(card, diff) {
  let { repetitions: r, interval: iv, ease: e } = card;
  if(diff === 'again') { r = 0; iv = 1; }
  else if(diff === 'hard') { r++; iv = 1; if(e > 1.3) e -= 0.2; }
  else if(diff === 'good') { r++; if(r === 1) iv = 1; else if(r === 2) iv = 6; else iv = Math.round(iv * e); if(e < 2.5) e += 0.1; }
  else if(diff === 'easy') { r++; if(r === 1) iv = 4; else iv = Math.round(iv * e * 1.3); e += 0.15; }
  if(e < 1.3) e = 1.3;
  const days = diff === 'again' ? 0 : diff === 'hard' ? 1 : iv;
  return { ...card, repetitions: r, interval: iv, ease: e, due: Date.now() + days * 86400000 };
}

function answer(diff) {
  if(currentCardIndex === null) return;
  const card = deck().cards[currentCardIndex];
  const isCorrect = (diff === 'good' || diff === 'easy');
  
  const updated = updateSM2({...card}, diff);
  updated.correct = (card.correct || 0) + (isCorrect ? 1 : 0);
  updated.wrong = (card.wrong || 0) + (isCorrect ? 0 : 1);
  deck().cards[currentCardIndex] = updated;
  
  if(isCorrect) sesCorrect++; else sesWrong++;
  
  // Update streak
  const t = today();
  const s = app.streak;
  if(s.lastStudy === t) s.todayDone++;
  else { s.todayDone = 1; s.current = (s.lastStudy === (()=>{let d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})()) ? s.current+1 : 1; s.longest = Math.max(s.longest, s.current); }
  s.lastStudy = t;
  s.totalCards++;
  s.totalCorrect += isCorrect ? 1 : 0;
  
  save();
  updateStats();
  updateStreakBar();
  pickCard();
}

function updateStats() {
  let c=0,w=0,due=0;
  deck().cards.forEach(card => { c+=card.correct||0; w+=card.wrong||0; if((card.due||0)<=Date.now()) due++; });
  document.getElementById('statC').textContent = c;
  document.getElementById('statW').textContent = w;
  document.getElementById('statDue').textContent = due;
}

function updateStreakBar() {
  document.getElementById('streakPill').className = app.streak.current > 0 ? 'streak-pill active' : 'streak-pill inactive';
  document.getElementById('streakPill').innerHTML = app.streak.current > 0 ? '🔥 '+app.streak.current : '💤 0';
  document.getElementById('longestStreak').textContent = app.streak.longest;
  const pct = Math.min(100, Math.round(app.streak.todayDone / app.streak.dailyGoal * 100));
  document.getElementById('goalFill').style.width = pct+'%';
  document.getElementById('goalLabel').innerHTML = (app.streak.todayDone >= app.streak.dailyGoal ? '🎉 ' : '') + app.streak.todayDone + ' / ' + app.streak.dailyGoal + ' kart';
}

function setGoal() { let n = prompt('Günlük kart hedefi:', app.streak.dailyGoal); if(n && !isNaN(n)) { app.streak.dailyGoal = parseInt(n); save(); updateStreakBar(); } }

function changeDirection() { app.direction = document.getElementById('directionSelect').value; save(); pickCard(); }
function changeMode() { app.mode = document.getElementById('modeSelect').value; save(); pickCard(); }

function updateDeckList() {
  const list = document.getElementById('deckList'); list.innerHTML = '';
  app.decks.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'deck-item' + (i===app.currentDeck ? ' active' : '');
    btn.innerHTML = `<span>${d.name}</span><span class="deck-item-count">(${d.cards.length})</span>`;
    btn.onclick = () => { app.currentDeck = i; save(); updateDeckList(); pickCard(); updateStats(); closeSidebar(); };
    list.appendChild(btn);
  });
}

function createDeck() { let n = prompt('Deste adı:'); if(n) { app.decks.push({ name: n, cards: [] }); app.currentDeck = app.decks.length-1; save(); updateDeckList(); pickCard(); } }
function deleteDeck() { if(app.decks.length>1 && confirm('Sil?')) { app.decks.splice(app.currentDeck,1); app.currentDeck=0; save(); updateDeckList(); pickCard(); } }
function openSidebar() { document.getElementById('sidebarWrap').classList.add('open'); document.getElementById('sidebarBackdrop').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebarWrap').classList.remove('open'); document.getElementById('sidebarBackdrop').classList.remove('open'); }
function toggleAcc(id) { let body = document.getElementById('acc-body-'+id); let arrow = document.getElementById('acc-arrow-'+id); if(body) body.classList.toggle('open'); if(arrow) arrow.classList.toggle('open'); }
function openAddCard() { document.getElementById('addOverlay').classList.add('open'); document.getElementById('addWord').focus(); }
function closeAddCard() { document.getElementById('addOverlay').classList.remove('open'); document.getElementById('addWord').value = ''; document.getElementById('addMeaning').value = ''; document.getElementById('addSentence').value = ''; }
function doAddCard() {
  let word = document.getElementById('addWord').value.trim();
  let meaning = document.getElementById('addMeaning').value.trim();
  let sentence = document.getElementById('addSentence').value.trim();
  let category = document.getElementById('addCategory').value;
  let diffLabel = document.getElementById('addDiff').value;
  if(!word || !meaning) { alert('Kelime ve anlam zorunlu!'); return; }
  deck().cards.push({ word, meaning, sentence, category, diffLabel, correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due:Date.now(), history:[] });
  save(); updateDeckList(); pickCard(); updateStats(); closeAddCard();
}

function handleCSV(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/);
    let count = 0;
    for(let i=1; i<lines.length; i++) {
      const parts = lines[i].split(';');
      if(parts.length >= 2) {
        deck().cards.push({ word: parts[0].trim(), meaning: parts[1].trim(), sentence: parts[2]?.trim() || '', category: parts[4]?.trim() || 'Genel', diffLabel: parts[5]?.trim() || '', correct:0, wrong:0, repetitions:0, interval:0, ease:2.5, due:Date.now(), history:[] });
        count++;
      }
    }
    save(); updateDeckList(); pickCard(); updateStats();
    alert(count + ' kart yüklendi!');
  };
  reader.readAsText(file, 'UTF-8');
}

function openAnalysis() {
  const cards = deck().cards;
  let c=0,w=0;
  cards.forEach(card => { c+=card.correct||0; w+=card.wrong||0; });
  const total = c+w;
  document.getElementById('analysisContent').innerHTML = `<div style="text-align:center"><div style="font-size:48px;font-weight:700;color:#16a34a">${c}</div><div>Doğru</div><div style="font-size:48px;font-weight:700;color:#dc2626">${w}</div><div>Yanlış</div><div style="font-size:32px;font-weight:700;margin-top:16px">${total?Math.round(c/total*100):0}%</div><div>Başarı</div><div style="margin-top:20px;font-size:12px;color:#666">Toplam ${cards.length} kart</div></div>`;
  document.getElementById('analysisOverlay').classList.add('open');
}
function closeAnalysis() { document.getElementById('analysisOverlay').classList.remove('open'); }

function openManager() {
  let html = '<table style="width:100%;border-collapse:collapse;font-size:12px"><tr><th>Kelime</th><th>Anlam</th><th>Kategori</th><th>Doğru</th><th>Yanlış</th><th></th></tr>';
  deck().cards.forEach((card,i) => {
    html += `<tr><td>${card.word}</td><td>${card.meaning}</td><td>${card.category||'Genel'}</td><td>${card.correct||0}</td><td>${card.wrong||0}</td><td><button onclick="deleteCard(${i})">🗑</button></td></tr>`;
  });
  html += '</table>';
  document.getElementById('managerContent').innerHTML = html;
  document.getElementById('managerOverlay').classList.add('open');
}
function closeManager() { document.getElementById('managerOverlay').classList.remove('open'); }
function deleteCard(i) { if(confirm('Sil?')) { deck().cards.splice(i,1); save(); updateDeckList(); pickCard(); updateStats(); openManager(); } }

function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

loadData();
window.speechSynthesis?.getVoices();
