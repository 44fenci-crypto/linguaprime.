<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>LinguaPrime | Desteler ve Aralıklı Tekrar</title>
  <style>
    /* Tüm stiller aynen korundu, sadece sidebar ve form eklemeleri yapıldı */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #F1F3F5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .menu-btn {
      position: fixed; top: calc(12px + env(safe-area-inset-top)); left: 16px; z-index: 1000;
      width: 44px; height: 44px; border-radius: 14px;
      background: rgba(26, 26, 36, 0.8); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08); color: #F1F3F5; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .menu-btn:active { transform: scale(0.94); background: rgba(26, 26, 36, 1); }
    .card-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card-container { width: 100%; max-width: 560px; perspective: 1200px; touch-action: pan-y pinch-zoom; }
    .card {
      width: 100%; position: relative; transform-style: preserve-3d;
      transition: transform 0.4s ease; cursor: pointer; border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      backface-visibility: hidden; background: rgba(26,26,36,0.95);
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px; padding: 28px 24px; min-height: 380px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
    }
    .card-front { transform: rotateY(0deg); }
    .card-back { transform: rotateY(180deg); position: absolute; top:0; left:0; right:0; bottom:0; }
    .card[data-difficulty="kolay"] .card-face { border-left: 4px solid #22C55E; }
    .card[data-difficulty="orta"] .card-face { border-left: 4px solid #F97316; }
    .card[data-difficulty="zor"] .card-face { border-left: 4px solid #EF4444; }
    .word { font-size: clamp(28px, 8vw, 40px); font-weight: 700; margin-bottom: 16px; }
    .meaning { font-size: 18px; color: #9CA3AF; margin-top: 12px; }
    .sentence { margin-top: 24px; font-size: 14px; font-style: italic; color: #6B7280; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; width: 100%; }
    .badge { background: rgba(255,255,255,0.06); padding: 4px 12px; border-radius: 40px; font-size: 11px; color: #9CA3AF; margin-bottom: 16px; display: inline-block; }
    .action-bar { display: flex; justify-content: center; gap: 12px; padding: 20px; max-width: 560px; margin: 0 auto; width: 100%; }
    .action-btn {
      flex:1; padding:12px 8px; border-radius:28px; border:none; font-weight:600; font-size:14px;
      background: rgba(26,26,36,0.9); backdrop-filter:blur(8px); color:#F1F3F5; border:1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }
    .action-btn:active { transform: scale(0.96); }
    .again { border-left: 3px solid #EF4444; }
    .hard { border-left: 3px solid #F97316; }
    .good { border-left: 3px solid #22C55E; }
    .easy { border-left: 3px solid #3B82F6; }
    .swipe-icon { position: absolute; top: 20px; font-size: 40px; font-weight: bold; opacity: 0; transition: opacity 0.1s; pointer-events: none; z-index: 10; }
    .swipe-icon.right { right: 20px; color: #22C55E; }
    .swipe-icon.left { left: 20px; color: #EF4444; }

    /* Sidebar stili */
    .sidebar {
      position: fixed; top:0; left:0; width: 280px; height: 100%;
      background: #0F0F14; border-right: 1px solid rgba(255,255,255,0.06);
      transform: translateX(-100%); transition: transform 0.3s ease;
      z-index: 1001; padding-top: env(safe-area-inset-top);
      display: flex; flex-direction: column;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); font-weight: 600; }
    .sidebar-content { flex:1; overflow-y: auto; padding: 16px; }
    .deck-list { margin-bottom: 24px; }
    .deck-item {
      background: rgba(255,255,255,0.04); border: none; padding: 10px 12px; border-radius: 12px;
      color: #F1F3F5; width: 100%; text-align: left; margin-bottom: 6px; cursor: pointer;
    }
    .deck-item.active { background: #3B82F6; color: white; }
    .btn-add-deck { background: rgba(59,130,246,0.2); color: #3B82F6; margin-top: 8px; }
    .section-title { font-size: 12px; text-transform: uppercase; color: #6B7280; margin: 16px 0 8px; }
    .btn-sidebar { background: rgba(255,255,255,0.06); color: #F1F3F5; border: none; padding: 10px; width: 100%; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
    .overlay {
      position: fixed; inset:0; background: rgba(0,0,0,0.6); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #1A1A24; border-radius: 28px; width: 90%; max-width: 400px;
      padding: 20px; border: 1px solid rgba(255,255,255,0.08);
    }
    .modal input, .modal select {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 16px;
      background: #0A0A0F; border: 1px solid rgba(255,255,255,0.1); color: white;
    }
    .modal button { margin-top: 8px; }
    .flex-btns { display: flex; gap: 10px; margin-top: 12px; }
  </style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">📚 LinguaPrime</div>
  <div class="sidebar-content">
    <div class="section-title">Desteler</div>
    <div id="deckListContainer" class="deck-list"></div>
    <button class="btn-sidebar btn-add-deck" id="addDeckBtn">➕ Yeni Deste</button>
    <div class="section-title">Araçlar</div>
    <button class="btn-sidebar" id="addCardBtn">✍️ Kart Ekle</button>
    <button class="btn-sidebar" id="manageCardsBtn">📋 Kartları Yönet</button>
    <button class="btn-sidebar" id="settingsBtn">⚙️ Ayarlar</button>
  </div>
</div>

<div class="overlay" id="addCardModal">
  <div class="modal">
    <h3>Yeni Kart</h3>
    <input type="text" id="newWord" placeholder="Kelime (NL)" autocomplete="off">
    <input type="text" id="newMeaning" placeholder="Anlam (TR)" autocomplete="off">
    <select id="newDifficulty">
      <option value="">Zorluk seç</option>
      <option value="kolay">Kolay</option>
      <option value="orta">Orta</option>
      <option value="zor">Zor</option>
    </select>
    <div class="flex-btns">
      <button class="action-btn" id="cancelAddBtn">İptal</button>
      <button class="action-btn good" id="confirmAddBtn">Ekle</button>
    </div>
  </div>
</div>

<div class="card-area">
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="badge" id="categoryBadge">Kategori</div>
        <div class="word" id="frontWord">laden...</div>
        <div class="sentence" id="frontSentence"></div>
        <div class="swipe-icon right">✓</div>
        <div class="swipe-icon left">✗</div>
      </div>
      <div class="card-face card-back">
        <div class="badge" id="backCategoryBadge">Kategori</div>
        <div class="word" id="backWord"></div>
        <div class="sentence" id="backSentence"></div>
      </div>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="action-btn again" id="againBtn">Tekrar</button>
  <button class="action-btn hard" id="hardBtn">Zor</button>
  <button class="action-btn good" id="goodBtn">Biliyorum</button>
  <button class="action-btn easy" id="easyBtn">Kolay</button>
</div>

<script>
  // -------------------- IndexedDB Yönetimi --------------------
  const DB_NAME = 'LinguaPrimeDB';
  const DB_VERSION = 1;
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(db); };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('decks')) {
          const store = db.createObjectStore('decks', { keyPath: 'id', autoIncrement: true });
          store.createIndex('name', 'name', { unique: false });
        }
        if (!db.objectStoreNames.contains('cards')) {
          const cardStore = db.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
          cardStore.createIndex('deckId', 'deckId', { unique: false });
          cardStore.createIndex('due', 'due', { unique: false });
        }
      };
    });
  }

  // Yardımcı fonksiyonlar
  async function getDecks() {
    const tx = db.transaction('decks', 'readonly');
    const store = tx.objectStore('decks');
    return store.getAll();
  }
  async function getCards(deckId) {
    const tx = db.transaction('cards', 'readonly');
    const store = tx.objectStore('cards');
    const index = store.index('deckId');
    return index.getAll(deckId);
  }
  async function addDeck(name) {
    const tx = db.transaction('decks', 'readwrite');
    const store = tx.objectStore('decks');
    const id = await store.add({ name });
    return id;
  }
  async function addCard(card) {
    const tx = db.transaction('cards', 'readwrite');
    const store = tx.objectStore('cards');
    return store.add(card);
  }
  async function updateCard(card) {
    const tx = db.transaction('cards', 'readwrite');
    const store = tx.objectStore('cards');
    return store.put(card);
  }

  // -------------------- Uygulama Durumu --------------------
  let currentDeckId = null;
  let currentCards = [];        // O anki destedeki kartlar
  let currentCardIndex = 0;
  let isFlipped = false;
  let touchState = { startX: 0, startY: 0, swiping: false };

  // DOM elementleri
  const cardEl = document.getElementById('card');
  const frontWord = document.getElementById('frontWord');
  const frontSentence = document.getElementById('frontSentence');
  const categoryBadge = document.getElementById('categoryBadge');
  const backWord = document.getElementById('backWord');
  const backSentence = document.getElementById('backSentence');
  const backCategoryBadge = document.getElementById('backCategoryBadge');
  const swipeRightIcon = document.querySelector('.swipe-icon.right');
  const swipeLeftIcon = document.querySelector('.swipe-icon.left');
  const sidebar = document.getElementById('sidebar');
  const menuBtn = document.getElementById('menuBtn');
  const addDeckBtn = document.getElementById('addDeckBtn');
  const addCardBtn = document.getElementById('addCardBtn');
  const addCardModal = document.getElementById('addCardModal');
  const confirmAddBtn = document.getElementById('confirmAddBtn');
  const cancelAddBtn = document.getElementById('cancelAddBtn');

  // Yardımcılar
  function closeSidebar() { sidebar.classList.remove('open'); }
  function openSidebar() { sidebar.classList.add('open'); }
  menuBtn.onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();

  // Kart render
  function renderCurrentCard() {
    if (!currentCards.length || currentCardIndex >= currentCards.length) {
      frontWord.innerText = "🎉 Tüm kartlar tamam!";
      backWord.innerText = "Harika iş çıkarıyorsun!";
      return;
    }
    const card = currentCards[currentCardIndex];
    frontWord.innerText = card.word;
    frontSentence.innerText = card.sentence || "";
    categoryBadge.innerText = card.category || "Genel";
    backWord.innerText = card.meaning;
    backSentence.innerText = card.sentence ? `💬 ${card.sentence}` : "";
    backCategoryBadge.innerText = card.category || "Genel";
    cardEl.setAttribute('data-difficulty', card.difficulty || "");
    if (isFlipped) {
      cardEl.classList.remove('flipped');
      isFlipped = false;
    }
  }

  // Aralıklı tekrar güncelleme (basit SM-2 benzeri)
  function updateCardAfterAnswer(card, quality) {
    // quality: 'again', 'hard', 'good', 'easy'
    let interval = card.interval || 0;
    let ease = card.ease || 2.5;
    let repetitions = card.repetitions || 0;

    if (quality === 'again') {
      repetitions = 0;
      interval = 1;
    } else if (quality === 'hard') {
      repetitions = Math.max(1, repetitions);
      interval = Math.max(1, Math.round(interval * 0.8));
      ease = Math.max(1.3, ease - 0.2);
    } else if (quality === 'good') {
      repetitions++;
      if (repetitions === 1) interval = 1;
      else if (repetitions === 2) interval = 6;
      else interval = Math.round(interval * ease);
      ease = ease + (0.1 - (5 - 3) * 0.08);
    } else if (quality === 'easy') {
      repetitions++;
      if (repetitions === 1) interval = 2;
      else if (repetitions === 2) interval = 8;
      else interval = Math.round(interval * ease * 1.3);
      ease = ease + 0.15;
    }
    if (ease < 1.3) ease = 1.3;
    const due = Date.now() + interval * 86400000;
    return { ...card, repetitions, interval, ease, due };
  }

  // Cevap işleme
  async function answer(quality) {
    if (!currentCards.length) return;
    let card = currentCards[currentCardIndex];
    const updated = updateCardAfterAnswer(card, quality);
    await updateCard(updated);
    // Güncel dizideki kartı değiştir
    currentCards[currentCardIndex] = updated;
    // Sıradaki karta geç (due'ya göre sıralama yapılacak, şimdilik sırayla)
    nextCard();
  }

  function nextCard() {
    if (currentCardIndex + 1 < currentCards.length) {
      currentCardIndex++;
    } else {
      // Döngü veya due bazlı sıralama yapılabilir. Basitçe başa dön.
      currentCardIndex = 0;
    }
    renderCurrentCard();
  }

  // Deste yükleme
  async function loadDeck(deckId) {
    currentDeckId = deckId;
    currentCards = await getCards(deckId);
    // due tarihi geçmiş ve gelecek şeklinde sıralanabilir, şimdilik olduğu gibi
    currentCards.sort((a,b) => (a.due || 0) - (b.due || 0));
    currentCardIndex = 0;
    renderCurrentCard();
    renderDeckList();
  }

  // Desteleri listele
  async function renderDeckList() {
    const decks = await getDecks();
    const container = document.getElementById('deckListContainer');
    container.innerHTML = '';
    for (const deck of decks) {
      const btn = document.createElement('button');
      btn.className = 'deck-item' + (currentDeckId === deck.id ? ' active' : '');
      btn.textContent = deck.name;
      btn.onclick = () => loadDeck(deck.id);
      container.appendChild(btn);
    }
    if (decks.length === 0) {
      container.innerHTML = '<div style="color:#6B7280; padding:8px;">Deste yok, yeni oluşturun.</div>';
    }
  }

  // Yeni deste ekle
  async function createNewDeck() {
    const name = prompt('Deste adı:');
    if (!name) return;
    const newId = await addDeck(name);
    // Örnek bir kart ekleyelim
    await addCard({
      deckId: newId,
      word: 'voorbeeld',
      meaning: 'örnek',
      sentence: 'Dit is een voorbeeldkaart.',
      category: 'Genel',
      difficulty: 'kolay',
      due: Date.now(),
      repetitions: 0,
      interval: 0,
      ease: 2.5
    });
    await loadDeck(newId);
  }

  // Kart ekleme modalı
  function showAddCardModal() {
    addCardModal.classList.add('open');
  }
  function hideAddCardModal() {
    addCardModal.classList.remove('open');
    document.getElementById('newWord').value = '';
    document.getElementById('newMeaning').value = '';
  }
  async function addNewCard() {
    const word = document.getElementById('newWord').value.trim();
    const meaning = document.getElementById('newMeaning').value.trim();
    const difficulty = document.getElementById('newDifficulty').value;
    if (!word || !meaning) return alert('Kelime ve anlam gerekli');
    await addCard({
      deckId: currentDeckId,
      word,
      meaning,
      sentence: '',
      category: 'Genel',
      difficulty,
      due: Date.now(),
      repetitions: 0,
      interval: 0,
      ease: 2.5
    });
    await loadDeck(currentDeckId);
    hideAddCardModal();
  }

  // Swipe işlemleri
  function onTouchStart(e) {
    if (touchState.swiping) return;
    const touch = e.touches[0];
    touchState.startX = touch.clientX;
    touchState.startY = touch.clientY;
    touchState.swiping = true;
    cardEl.style.transition = 'none';
  }
  function onTouchMove(e) {
    if (!touchState.swiping) return;
    const dx = e.touches[0].clientX - touchState.startX;
    if (Math.abs(dx) < 10) return;
    e.preventDefault();
    const rotate = dx * 0.02;
    const translateX = dx * 0.5;
    cardEl.style.transform = `rotateY(${isFlipped ? 180 : 0}deg) rotateZ(${rotate}deg) translateX(${translateX}px)`;
    const opacity = Math.min(Math.abs(dx) / 80, 0.8);
    if (dx > 0) { swipeRightIcon.style.opacity = opacity; swipeLeftIcon.style.opacity = 0; }
    else { swipeLeftIcon.style.opacity = opacity; swipeRightIcon.style.opacity = 0; }
  }
  function onTouchEnd(e) {
    if (!touchState.swiping) return;
    const dx = e.changedTouches[0].clientX - touchState.startX;
    cardEl.style.transition = '';
    cardEl.style.transform = '';
    swipeRightIcon.style.opacity = 0;
    swipeLeftIcon.style.opacity = 0;
    if (Math.abs(dx) > 80) {
      if (dx > 0) answer('good');
      else answer('again');
    }
    touchState.swiping = false;
  }
  cardEl.addEventListener('touchstart', onTouchStart, { passive: false });
  cardEl.addEventListener('touchmove', onTouchMove, { passive: false });
  cardEl.addEventListener('touchend', onTouchEnd);
  cardEl.addEventListener('click', () => {
    if (!touchState.swiping) {
      cardEl.classList.toggle('flipped');
      isFlipped = !isFlipped;
    }
  });

  // Butonlar
  document.getElementById('againBtn').onclick = () => answer('again');
  document.getElementById('hardBtn').onclick = () => answer('hard');
  document.getElementById('goodBtn').onclick = () => answer('good');
  document.getElementById('easyBtn').onclick = () => answer('easy');
  addDeckBtn.onclick = createNewDeck;
  addCardBtn.onclick = showAddCardModal;
  confirmAddBtn.onclick = addNewCard;
  cancelAddBtn.onclick = hideAddCardModal;
  document.getElementById('manageCardsBtn').onclick = () => alert('Kart yönetimi (düzenleme) ileride eklenecek.');
  document.getElementById('settingsBtn').onclick = () => alert('Bildirim ve tema ayarları yakında.');

  // Başlat
  (async () => {
    await openDB();
    const decks = await getDecks();
    if (decks.length === 0) {
      await addDeck('Genel');
      const decks2 = await getDecks();
      if (decks2.length) await loadDeck(decks2[0].id);
      else loadDeck(null);
    } else {
      await loadDeck(decks[0].id);
    }
    renderDeckList();
  })();
</script>
</body>
</html>
