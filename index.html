<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>LinguaPrime | Yeni Nesil Dil Kartları</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #F1F3F5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Hamburg menü (sabit) */
    .menu-btn {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 16px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(26, 26, 36, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #F1F3F5;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .menu-btn:active {
      transform: scale(0.94);
      background: rgba(26, 26, 36, 1);
    }

    /* Ana kart alanı */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card-container {
      width: 100%;
      max-width: 560px;
      perspective: 1200px;
      touch-action: pan-y pinch-zoom; /* Dikey kaydırmaya izin ver, yatay swipe bizim */
    }

    .card {
      width: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease, box-shadow 0.2s;
      cursor: pointer;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    /* Swipe sırasında geçici stil */
    .card.swiping {
      transition: none;
    }

    .card-face {
      backface-visibility: hidden;
      background: rgba(26, 26, 36, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 28px 24px;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .card-front {
      transform: rotateY(0deg);
    }

    .card-back {
      transform: rotateY(180deg);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* Zorluk seviyesine göre sol çizgi */
    .card[data-difficulty="kolay"] .card-face {
      border-left: 4px solid #22C55E;
    }
    .card[data-difficulty="orta"] .card-face {
      border-left: 4px solid #F97316;
    }
    .card[data-difficulty="zor"] .card-face {
      border-left: 4px solid #EF4444;
    }

    .word {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #F1F3F5;
    }

    .meaning {
      font-size: 18px;
      color: #9CA3AF;
      margin-top: 12px;
    }

    .sentence {
      margin-top: 24px;
      font-size: 14px;
      font-style: italic;
      color: #6B7280;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 20px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 11px;
      color: #9CA3AF;
      margin-bottom: 16px;
    }

    /* Aksiyon butonları (alt kısım) */
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      background: transparent;
    }

    .action-btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 28px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.1s linear;
      background: rgba(26, 26, 36, 0.9);
      backdrop-filter: blur(8px);
      color: #F1F3F5;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .action-btn:active {
      transform: scale(0.96);
      background: #2A2A36;
    }

    .again { border-left: 3px solid #EF4444; }
    .hard { border-left: 3px solid #F97316; }
    .good { border-left: 3px solid #22C55E; }
    .easy { border-left: 3px solid #3B82F6; }

    /* Swipe sırasında ikon gösterimi */
    .swipe-icon {
      position: absolute;
      top: 20px;
      font-size: 40px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      z-index: 10;
    }
    .swipe-icon.right {
      right: 20px;
      color: #22C55E;
    }
    .swipe-icon.left {
      left: 20px;
      color: #EF4444;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card-face {
        padding: 20px 16px;
        min-height: 320px;
      }
      .action-btn {
        padding: 10px 6px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>

<div class="card-area">
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="badge" id="categoryBadge">Kategori</div>
        <div class="word" id="frontWord">lopen</div>
        <div class="sentence" id="frontSentence"></div>
        <div class="swipe-icon right" id="swipeRight">✓</div>
        <div class="swipe-icon left" id="swipeLeft">✗</div>
      </div>
      <div class="card-face card-back">
        <div class="badge" id="backCategoryBadge">Kategori</div>
        <div class="word" id="backWord">yürümek</div>
        <div class="meaning" id="backMeaning"></div>
        <div class="sentence" id="backSentence"></div>
      </div>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="action-btn again" id="againBtn">Tekrar</button>
  <button class="action-btn hard" id="hardBtn">Zor</button>
  <button class="action-btn good" id="goodBtn">Biliyorum</button>
  <button class="action-btn easy" id="easyBtn">Kolay</button>
</div>

<script>
  // MOCK VERİ – Geçici, ileride IndexedDB'den gelecek
  const mockCards = [
    { id: 1, word: "lopen", meaning: "yürümek", sentence: "Ik loop naar huis.", antonym: "stil", category: "Fiiller", difficulty: "kolay", grammar_type: "", unit: "Günlük" },
    { id: 2, word: "fiets", meaning: "bisiklet", sentence: "Ik fiets naar werk.", antonym: "", category: "Ulaşım", difficulty: "kolay", grammar_type: "", unit: "" },
    { id: 3, word: "opbellen", meaning: "aramak (telefonla)", sentence: "Ik bel je morgen op.", antonym: "", category: "Fiiller", difficulty: "orta", grammar_type: "ayrılabilir", unit: "Telefon" },
    { id: 4, word: "kunnen", meaning: "yapabilmek", sentence: "Ik kan goed zwemmen.", antonym: "", category: "Modal Fiiller", difficulty: "zor", grammar_type: "modal", unit: "" },
    { id: 5, word: "lopen (verleden)", meaning: "yürüdü (geçmiş)", sentence: "Ik liep gisteren.", antonym: "", category: "Fiiller", difficulty: "orta", grammar_type: "düzensiz", unit: "Geçmiş Zaman" },
  ];

  let currentIndex = 0;
  let isFlipped = false;
  let touchStartX = 0;
  let touchStartY = 0;
  let isSwiping = false;
  let swipeThreshold = 80;

  const cardEl = document.getElementById('card');
  const frontWord = document.getElementById('frontWord');
  const frontSentence = document.getElementById('frontSentence');
  const categoryBadge = document.getElementById('categoryBadge');
  const backWord = document.getElementById('backWord');
  const backSentence = document.getElementById('backSentence');
  const backCategoryBadge = document.getElementById('backCategoryBadge');
  const swipeRightIcon = document.getElementById('swipeRight');
  const swipeLeftIcon = document.getElementById('swipeLeft');

  // Kartı güncelle
  function updateCard() {
    const card = mockCards[currentIndex];
    if (!card) return;

    // Ön yüz (Hollandaca)
    frontWord.innerText = card.word;
    frontSentence.innerText = card.sentence || "📖 Örnek cümle yok";
    categoryBadge.innerText = card.category || "Genel";
    // Arka yüz (Türkçe)
    backWord.innerText = card.meaning;
    backSentence.innerText = card.sentence ? `💬 ${card.sentence}` : "";
    backCategoryBadge.innerText = card.category || "Genel";
    
    // Zorluk seviyesine göre data attribute (çizgi rengi)
    cardEl.setAttribute('data-difficulty', card.difficulty || "");
    
    // Çevrilmişse düzelt
    if (isFlipped) {
      cardEl.classList.remove('flipped');
      isFlipped = false;
    }
  }

  // Cevap işleme (buton veya swipe)
  function answer(quality) {
    // quality: 'again', 'hard', 'good', 'easy'
    console.log(`Cevap: ${quality} - Kart: ${mockCards[currentIndex].word}`);
    // Burada SM-2 veya aralıklı tekrar mantığı entegre edilecek (sonraki adım)
    // Şimdilik sıradaki karta geç
    nextCard();
  }

  function nextCard() {
    if (currentIndex + 1 < mockCards.length) {
      currentIndex++;
      updateCard();
    } else {
      // Döngü modu veya mesaj
      alert('Tüm kartları tamamladınız! Tekrar başlatılıyor.');
      currentIndex = 0;
      updateCard();
    }
  }

  // Kartı çevir (normal mod)
  function flipCard() {
    if (isSwiping) return;
    cardEl.classList.toggle('flipped');
    isFlipped = !isFlipped;
  }

  // SWIPE MEKANİZMASI (Tinder tarzı)
  function onTouchStart(e) {
    if (isSwiping) return;
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    isSwiping = true;
    cardEl.style.transition = 'none';
  }

  function onTouchMove(e) {
    if (!isSwiping) return;
    const touch = e.touches[0];
    const deltaX = touch.clientX - touchStartX;
    const deltaY = touch.clientY - touchStartY;
    if (Math.abs(deltaX) < 10) return;
    e.preventDefault();
    
    // Kartı hafifçe döndür ve ikonları göster
    const rotate = deltaX * 0.02; // max 5-6 derece
    const translateX = deltaX * 0.5;
    cardEl.style.transform = `rotateY(${isFlipped ? 180 : 0}deg) rotateZ(${rotate}deg) translateX(${translateX}px)`;
    
    // İkon opaklığı
    const opacity = Math.min(Math.abs(deltaX) / swipeThreshold, 0.8);
    if (deltaX > 0) {
      swipeRightIcon.style.opacity = opacity;
      swipeLeftIcon.style.opacity = 0;
    } else if (deltaX < 0) {
      swipeLeftIcon.style.opacity = opacity;
      swipeRightIcon.style.opacity = 0;
    }
  }

  function onTouchEnd(e) {
    if (!isSwiping) return;
    const endX = e.changedTouches[0].clientX;
    const deltaX = endX - touchStartX;
    const absDelta = Math.abs(deltaX);
    
    // Geçici stilleri sıfırla
    cardEl.style.transition = '';
    cardEl.style.transform = '';
    swipeRightIcon.style.opacity = 0;
    swipeLeftIcon.style.opacity = 0;
    
    if (absDelta > swipeThreshold) {
      if (deltaX > 0) {
        // Sağa kaydır -> Biliyorum / Kolay
        answer('good');
      } else {
        // Sola kaydır -> Tekrar / Zor
        answer('again');
      }
    }
    isSwiping = false;
    // Kart pozisyonunu düzelt
    cardEl.style.transform = '';
  }

  // Olayları bağla
  cardEl.addEventListener('touchstart', onTouchStart, { passive: false });
  cardEl.addEventListener('touchmove', onTouchMove, { passive: false });
  cardEl.addEventListener('touchend', onTouchEnd);
  cardEl.addEventListener('click', (e) => {
    // Tıklama ile swipe çakışmasın
    if (!isSwiping) flipCard();
  });

  // Buton olayları
  document.getElementById('againBtn').addEventListener('click', () => answer('again'));
  document.getElementById('hardBtn').addEventListener('click', () => answer('hard'));
  document.getElementById('goodBtn').addEventListener('click', () => answer('good'));
  document.getElementById('easyBtn').addEventListener('click', () => answer('easy'));
  document.getElementById('menuBtn').addEventListener('click', () => {
    alert('Menü henüz bağlanmadı. Gelecek güncellemede ayarlar, desteler, keşfet vs. burada olacak.');
  });

  // İlk kart yükleme
  updateCard();
</script>
</body>
</html>
